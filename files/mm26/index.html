## Motivation


.content[
&lt;img src="images/spat_voting.svg" width="100%" /&gt;
]


???

In a spatial voting model, how do we think about where parties are? 
- Where people truly think parties are is likely idiosyncratic. 
- Idiosyncratic placements in surveys are potentially endogenous to vote choice. 
- Expert placements are fixed across individuals. 
- Is there something better?


---

&lt;img src="images/expert_citizen_bbt_lr.png" width="75%" style="display: block; margin: auto;" /&gt;

Voters have, on average, coherent ideas about where parties are that are not _so_ different from the experts.

## Previous Work in Canada

&lt;center&gt;
&lt;img src="images/group_bbt_lr.png" class="zoomable" data-scale="2.5" style="width:50%;"&gt;
&lt;/center&gt;

???

These differences are systematic 
- Men are closer to experts than women with more distinction between parties
- Older voters are closer to experts than younger ones. 
- Higher educated voters are closer to experts than less educated ones.
- Those in the centre are closer to the experts than those on the left or right. 

---

## Research Questions

1. Are the things we found in Canada similar in other contexts?
2. Does this have implications for how we think about spatial voting models?
3. Are voters who are more out of step with the experts less satisfied with democracy?

---

## Expectations

1. Differences in perceptions of party placements are structured

  - Individual factors: Age, Edcuation, Income, Gender, Knowledge, Ideology
  - System-level factors: Type of Electoral System, Number of Parties, Economic Inequality, Regime age

--

2. That structure helps predict vote choice in a spatial voting model. 

--

3. People who see politics as different from the experts are less satisfied with democracy.

## Data: CSES Integrated Module Dataset

_Demographcis_
- Age: 18-44, 45-64, 65+
- Gender: Male, Female
- Education: Secondary or Less, Some post-secondary, University Degree
- Income: Low (bottom `\(20\%\)`), Middle (mid `\(60\%\)`), High (highest `\(20\%\)`)
- Political Knowledge: Low, High
- Ideology: Left (0-2), Centre (3-7), Right (8-10)

---

## Data: CSES Integrated Module Dataset

_Party Placements_
- CSES expert party placement
- Individual left-right placement
- Individual left-right placement of each party

_System_
- Effective Number of Electoral Parties
- Type of Electoral System (PR, Majoritarian, Mixed)
- Regime Age
- GINI Coefficient (Gapminder)

---

## Procrustes Mapping 

`$$\text{Expert}_{j} = a_i + b_i \text{Individual}_{ij} + e_{ij}$$`
`\(b_i\)` is the _scale_ parameter 
- If `\(b_i &lt; 1\)`, individual's placements are wider than experts
- if `\(b_i &gt; 1\)`, individual's placements are narrower than experts

`\(a_i\)` is the shift parameter
- If `\(a_i &lt; 0\)`, individuals place parties to the right of experts, on average. 
- If `\(a_i &gt; 0\)`, individuals place parties to the left or experts, on average. 


???

Even though experts and respondents are nominally on the same scale, they may use the scale differently. 

When evaluating their similarities, we want to remove as much of that scale-use difference as possible.

## Does Correspondence Relate to Structural Factors?

Not Really: 
- ENEP, regime age, system type and gini - all insignificant in individual level HLM. 
- Regime age is negative and significant in a model of averages. 

---

## Spatial Voting Model

1D Spatial Voting Model (Left-Right) estimated with conditional logit. 
- Model 1: jack-knife party placements using mean of other respondents with same age group, gender, knowledge, income and education. 
    - Must have all parties placed. 
    - Must have non-self donors for placements. 
    
- Model 2: CSES expert party placements

## Conclusion

1. Voters often have systematically different perceptions of the political landscape than experts. 
2. Those differences are structured by individual-level factors. 
3. On average, those differences translate into how people cast votes based on their perceptions of the political landscape. 
4. The farther people are from the experts, the less satisfied they are with democracy.
