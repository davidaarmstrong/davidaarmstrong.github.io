## Can models be true? 

- .highlight[No] - "all models are wrong, some are useful" (Box)

--

- .highlight[No] - models can be useful or not (they are _purpose-relative_), but to think of them as true or false is not interesting (Clarke and Primo)

--

- .highlight[No] - could never actually make all the right choices and wouldn't know if you did (Neumayer and Plümper)

--

- .highlight[No] - models are simple, parametric representations of a complex, nonparametric reality (Burnham and Anderson)

--

- .highlight[No] - Models are fragile, theory-laden simplifications whose inferential credibility depends on how conclusions behave under plausible specification perturbations (Leamer)

--

- .highlight[No] - [Models are] only as credible as the substantive plausibility of the stochastic model generating it. (Freedman)

## What Do Models Tell Us? 


.highlight[Statistical models help us assess whether theories and hypotheses derived from unsystematic or anecdotal observation are broadly consistent with systematically collected data under explicit assumptions and simplifying abstractions ]

--

Models are: 
- Useful simplified abstractions of complex reality
- Empirically useful tools for summarizing relationships in large multivariate data
- Devices for clarifying assumptions and generating testable implications
- Necessarily incomplete representations whose usefulness depends on purpose and context

## Classical Econometrics


If `\(y = \beta_0 + \beta_1 x+ \beta_2 z + \varepsilon\)`, what are the properties of [Estimator Name] and its ability to recover `\(\beta_1\)` with `\(y = b_0 + b_1x + b_2z + e\)`. 

- Bias: does `\(E(b_1|x,z) = \beta_1\)`
- Variance: How variable is `\(b_1\)` in repeated samples, is it efficient. 
- Consistency: Does `\(b_1 \overset{p}{\rightarrow} \beta_1\)`  

--

If there is no true `\(\beta_1\)` then what do bias and consistency mean?

## What is Robustness?

### Estimator Robustness - Classical Econometrics

- Preservation of estimator properties (unbiasedness, consistency, efficiency) under assumption violations 

--

### Inferential Robustness- "Approximationist"

- The ability of the model to capture important structure despite its imperfections (Box)

- Extent to which substantive conclusions survive plausible alternative specifications (Leamer)

- Credibility under violated stochastic assumptions (Freedman)

- Stability under varied abstractions aimed at the same purpose (Clarke and Primo)

- Predictive acccuracy across approximating models (Burnham and Anderson)


???

The dominant uncertainty in applied econometrics is usually not sampling uncertainty, but specification uncertainty. (Leamer)

class: middle center inverse

.large-text[Robustness refers to the stability of substantive conclusions under plausible changes to assumptions, specifications, abstractions, or inferential frameworks, recognizing that all models are simplified representations of complex social processes.]

---

## Robustness Operationalizations

All robustness measures attempt to answer:

&gt; How similar are the inferential conclusions implied by two plausible models?

Different measures emphasize different aspects of similarity:

| Measure                     | Emphasises               |
|-----------------------------|--------------------------|
| Neumayer and Pluemper       | Overlap with baseline    |
| Overlap Coefficient         | Shared probability mass  |
| Kullbach-Leibler Divergence | Information loss         |
| Jensen-Shannon Divergence   | Inferential disagreement |

---

## N-P Operationalization of Robustness

.pull-left[
What proportion of an alternative plausible model effect's sampling distribution overlaps the baseline model effect's 95% confidence interval. 

`$$\rho(\hat{\beta}_r) = \int_{\hat{\beta}_b - C\hat{\sigma}_b}^{\hat{\beta}_b + C\hat{\sigma}_b} f(\hat{\beta}_r|\mathbf{y}, \mathbf{X}, \hat{\theta})d\hat{\beta}_r$$` 

- `\(\rho(\hat{\beta}_r)\)` is an asymmetric measure that natively lies in the interval `\([0,1]\)` and it increases in similarity. 


]
.pull-right[

&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-1-1.png" alt="Visualization of Neumayer and Pluemper robustness.  It shows a normal distribution representing the robustness test estiamte and dashed vertical lines representing the confidence intervals of the baseline estimate.  Roughly 60% of the distribution is shaded between the vertical lines." width="75%" style="display: block; margin: auto;" /&gt;
]

### Calculate Robustness


``` r
library(nprobustness)
robustness(dnorm, dnorm, 
   target_args = list(mean = 2.0, 
                      sd = .5), 
   alt_args = list(mean = 1.5, 
                   sd = .35))
```

```

## 0.5396479 0.9148595 0.2320148 1.1841414
```

## Overlap Coefficient

.pull-left[

The "Overlap Coefficient" (OVL) measures the proportion of shared probability mass between two uncertainty distributions.

`$$OVL = \int \min(f_1(\theta),f_2(\theta))d\theta$$` 

- OVL is a symmetric measure that natively lies in the interval `\([0,1]\)` and it increases in similarity


]
.pull-right[
&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-5-1.png" alt="Normal probability density functions for the Target (baseline) and Alternative, with their shared probability mass highlighted to illustrate the overlap coefficient.  The overlap coefficient is roughly .53 here." width="100%" /&gt;


]

---

## Kullbach-Leibler Divergence 

.pull-left[

How much inferential structure from the target is not captured by the alternative.

- With `\(p(x)\)` as the target and `\(q(x)\)` as the alternative 

$$
D_{KL}(p\parallel q)=\int p(x)\log\frac{p(x)}{q(x)}dx
$$

- K-L Divergence is an asymmetric measure that natively lies in the interval `\([0,\infty]\)` and it increases in divergence


]
.pull-right[
&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-6-1.png" alt="Target (baseline) and alternative normal probability density functions with a shaded region showing the pointwise contribution to Kullback-Leibler divergence from the target to the alternative." width="100%" /&gt;
]

---

## Jensen-Shannon Divergence


.pull-left[
JS is the average information discrepancy between each individual distribution and the shared midpoint mixture


$$
\newcommand{\DKL}{D_{\operatorname{KL}}}
JS(p,q) = \frac{1}{2} \DKL(p,m) + \frac{1}{2} \DKL(q,m)
$$ 


where: `\(m = \frac{1}{2}(p+q)\)`

- JS is a symmetric measure that natively lies in the interval `\([0,\log(2)]\)`, but in the R package is rescaled to be in `\([0,1]\)` and it increases in divergence
]
.pull-right[


&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-7-1.png" alt="Target (baseline), alternative, and dashed midpoint-mixture distributions with shaded Jensen-Shannon contribution, illustrating disagreement relative to the shared mixture distribution." width="100%" /&gt;




]

## 4 Steps to Robustness Testing

1. Define baseline model (theory + fit)
2. Identify arbitrary modeling choices
3. Develop models that change arbitrary choices 
4. Calculate robustness for alternative models

## Robust to what?

- Distribution of the errors
- Variance-covariance structure of the errors
- Explanatory variables in the model
- Measurement strategies for outcome and explanatory variables
- Functional form of relationships between outcome and explanatory variables
- Level of causal homogeneity assumed
- Definition of population and relationship to sample
- Assumptions about measurement error 
- Temporal dynamics and dependence
- Spatial dynamics and dependence

We will discuss what kinds of tests we can do to solve these tomorrow and throughout the course.

## Example: Barry and Kleinberg (2015)

Models of US FDI flows as a function of trade dependence and sanctions busting history. 

1. In response to sanctions imposition, sender-state firms increase FDI disproportionately in host states that have a record of sanctions-busting against the sender state.
    - Variable: _ab\_sum_ yearly count of sanction busing behavior. 
    - variable: _hse\_sanction_ whether the country has US sanctions in place. 
2. In response to sanctions imposition, sender-state firms increase FDI disproportionately in host states that are more highly dependent on trade with target states.
    - variable: _tradeshare_ recipient country's dependence on trade with the countries sanctioned by the US. 
3. In response to sanctions imposition, sender-state firms increase FDI disproportionately in host states upon whom target states are more highly trade dependent.
    - variable: _sancmeanshare_ the extent to which sanctioned states are dependent on third party states for foreign trade.

## GLMs

GLMs have 4 components:

1. Stochastic component: `\(\mathbf{Y}\)` is a random or stochastic component that we expect to change from sample to sample in the frequentist thought experiment.

1. Systematic component: `\(\mathbf{\theta} = \mathbf{X\beta}\)`

1. Link function: The stochastic and systematic components are linked through a function which "tricks" the model into thinking that it is still acting on normally distributed outcomes.

1. Residuals: The residuals can be computed the same way as in the linear model, but there are other, perhaps more useful options here, too.

---


## Estimation

Estimation could be done in a number of ways, easiest is with the generalized linear model. In our normal linear model: 

`$$\begin{aligned}
    \mathbf{Y} &amp;= \mathbf{X\beta} + \mathbf{\varepsilon}\\
    E(\mathbf{Y}) &amp;= \mathbf{\theta} = \mathbf{X\beta}
\end{aligned}$$`

The generalization, is: 

`$$g(\mathbf{\mu}) = \mathbf{\theta} = \mathbf{X\beta}$$`

where `\(g(\cdot)\)` is a "link function" that transforms the unbounded linear predictor into the response space of `\(\mathbf{Y}\)`.  

---


## Model of Voting

In our model of voting: 


`$$\begin{aligned}
\mathbf{X}\beta &amp;= b_0 + b_1\text{Age} + b_2\text{Education} + b_3\text{Income}  \\
  &amp;+ b_4\text{Left-Right Self Placement} + b_5\text{Sex=Female}  \\
  &amp;+ b_6\text{Race=White} + b_7\text{Race=Black}
\end{aligned}$$`

`$$\begin{aligned}
log\left(\frac{Pr(\text{Voted}|\mathbf{X})}{1-Pr(\text{Voted}|\mathbf{X})}\right) &amp;= \mathbf{X}\beta\\
\widehat{Pr(\text{Voted})} &amp;= \frac{e^{\mathbf{X}\beta}}{1+e^{\mathbf{X}\beta}}
\end{aligned}$$`

---

## Interpreting Coefficients

We could interpret coefficients the same as in the linear model, but with a different dependent variable.  

- For every one-unit change in education, the log of the odds of the probability of voting goes up by 0.28.  *How enlightening!*

- This is often not an intuitive metric for your readers (or yourselves).  

- And, it doesn't really tell us anything about the actual probability of voting.  

---

## Interpretation of Coefficients II

So, the coefficients do not have a great intuitive interpretation on their own.  Then, what do we do?  

- Think back to what the coefficient told us in OLS - the predicted change in `\(y\)` for a unit change in `\(x\)`.  

- In the OLS case, `\(y\)` was the quantity in which we were directly interested.  Here, however, the quantity in which we're interested is `\(Pr(y=1)\)`.  

- Why not calculate how much we would predict `\(Pr(y=1)\)` to increase for every unit increase in `\(x\)`? 



---


## What does a one-unit change mean? 

Here, we're going to move Education by one unit holding everything else constant at the following values: 


- Age = 45: .0357 x 45 = 1.6065 
- Income = 15: 0.082 x 15 = 0.123
- Left-right = 5: -0.635 x 5 + 0.0539 x 25 = -1.8275
- Female = 0: 0.3956 x 0 = 0
- Race = White: 0.6347 x 1 + 2.0413 x 0 = 0.6347

When we add all of that stuff up along with the intercept, we get: 

`$$\begin{aligned}
\mathbf{X}\beta_{-j} &amp;= -4.5138 + 1.6065 + 0.123 - 1.8275 + 0 + 0.6347 = -3.9771
\end{aligned}$$`

So, that gives us the following: `\(\mathbf{X}\beta = 0.284\times\text{Education} - 3.9771\)`.  

---

## One unit change in Education

Let's think about what moving from 0 to 1 years of education does for the probability of voting: 

`$$\begin{aligned}
Pr(\text{Voted} | \text{Education} = 0) &amp;= \frac{e^{.284\times 0 - 3.9771}}{1+ e^{.284\times 0 - 3.9771}}\\
                                        &amp;= \frac{0.0187}{1.0187} = 0.0184\\
Pr(\text{Voted} | \text{Education} = 1) &amp;= \frac{e^{.284\times 1 - 3.9771}}{1+ e^{.284\times 1 - 3.9771}}\\
                                        &amp;= \frac{0.0249}{1.0249} = 0.0243\\
\Delta Pr(\text{Voted} | \text{Education}: 0\rightarrow 1) &amp;= 0.0243 - 0.0184\\
                                                           &amp;= 0.0059
\end{aligned}$$`

---

## A Different One-unit Change

What if we changed education from 15$\rightarrow$16 instead of from 0$\rightarrow$1.  

`$$\begin{aligned}
Pr(\text{Voted} | \text{Education} = 15) &amp;= \frac{e^{.284\times 15 - 3.9771}}{1+ e^{.284\times 15 - 3.9771}}\\
                                        &amp;= \frac{1.3270}{2.3270} = 0.5703\\
Pr(\text{Voted} | \text{Education} = 16) &amp;= \frac{e^{.284\times 16 - 3.9771}}{1+ e^{.284\times 16 - 3.9771}}\\
                                        &amp;= \frac{1.7628}{2.7628} = 0.6380\\
\Delta Pr(\text{Voted} | \text{Education}: 15\rightarrow 16) &amp;= 0.6380 - 0.5703\\
                                                           &amp;= 0.0677
\end{aligned}$$`

## Taking Stock

What dowe know so far? 


- The coefficients don't have a nice intuitive interpretation like they do in OLS. 

- The coefficients do not necessarily indicate anything in particular about the absolute value of the predicted probability.  

- Different one-unit changes can have different effects.

## More Complications

Before we get comfortable with our current situation, let's consider a different individual.  Someone the same as the person above, but who is extremely liberal.


- Age = 45: .0357 x 45 = 1.6065 
- Income = 15: 0.082 x 15 = 0.123
- Left-right = 0: -0.635 x 0 + 0.0539 x 0 = 0
- Female = 0: 0.3956 x 0 = 0
- Race = White: 0.6347 x 1 + 2.0413 x 0 = 0.6347
- `\(\mathbf{X}\beta\)` = -2.1496



---

## One unit change in Education

Let's think about what moving from 0 to 1 years of education does for the probability of voting:

`$$\begin{aligned}
Pr(\text{Voted} | \text{Education} = 0) &amp;= \frac{e^{.284\times 0 - 2.1496}}{1+ e^{.284\times 0 - 2.1496}}\\
                                        &amp;= 0.1046\\
Pr(\text{Voted} | \text{Education} = 1) &amp;= \frac{e^{.284\times 1 - 2.1496}}{1+ e^{.284\times 1 - 2.1496}}\\
                                        &amp;= 0.1343\\
\Delta Pr(\text{Voted} | \text{Education}: 0\rightarrow 1) &amp;= 0.1343-0.1046\\
                                                           &amp;= 0.0297
\end{aligned}$$`
---

## A Different One-unit Change

What if we changed education from 15$\rightarrow$16 instead of from 0$\rightarrow$1.

`$$\begin{aligned}
Pr(\text{Voted} | \text{Education} = 15) &amp;= \frac{e^{.284\times 15 - 2.1469}}{1+ e^{.284\times 15 - 2.1469}}\\
                                        &amp;= 0.8282\\
Pr(\text{Voted} | \text{Education} = 16) &amp;= \frac{e^{.284\times 16 - 2.1469}}{1+ e^{.284\times 16 - 2.1469}}\\
                                        &amp;= \frac{1.7628}{2.7628} = 0.8607\\
\Delta Pr(\text{Voted} | \text{Education}: 15\rightarrow 16) &amp;= 0.8607-0.8282\\
                                                           &amp;= 0.0325
\end{aligned}$$`

## Taking Stock II

What *else* do we know now? 

- We know that not every change from one value to another (e.g., `\(15\rightarrow16\)`) has the same effect.  

- In addition to knowing that not every change of the same size (e.g., one-unit) has the same effect. 


So, how do we characterize the *effect* of a variable in a model? 

---


## Approaches to Discrete Changes


- Hold all other variables constant at their means and calculate the change in `\(Pr(y=1)\)` for a unit, standard deviation or maximal change in `\(x\)`.  [Marginal Effect at Means]

- Hold all other variables constant at reasonable/representative and calculate the change in `\(Pr(y=1)\)` for a unit, standard deviation or maximal change in `\(x\)`. [Marginal Effects at Reasonable values]

- Calculate the discrete change in `\(Pr(y=1)\)` for all observations and then average the changes in predicted probabilities.  [Average Marginal Effects]

---

## OLS Coefficients are "Collapsible"





.pull-left[
Consider the following simple simulation: 

`$$\begin{aligned}
x &amp;\sim N(0,1)\\
z &amp;\sim N(0,1)\\
r_{x,z} &amp;\approx 0\\
p_y &amp;= \frac{1}{1+e^{-(x + z)}}\\
y &amp;\sim Bern(p_y)
\end{aligned}$$`

Imagine we estimate two models: 

`$$\begin{aligned}
y &amp;= b_0 + b_1 x\\
y &amp;= g_0 + g_1 x + g_2 z
\end{aligned}$$`
]
.pull-right[

&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-16-1.png" alt="Scatterplot comparing simple and multiple OLS coefficient estimates across simulations; points cluster close to the 45-degree reference line, illustrating collapsibility.  That is whether including or excluding a variable unrelated to x and y, the coefficient relating x to y remains the same, on average." width="90%" style="display: block; margin: auto;" /&gt;
]


---

## Non-linear GLM Coefficients are "Non-collapsible"

.pull-left[
Consider the following simple simulation: 

`$$\begin{aligned}
x &amp;\sim N(0,1)\\
z &amp;\sim N(0,1)\\
r_{x,z} &amp;\approx 0\\
p_y &amp;= \frac{1}{1+e^{-(x + z)}}\\
y &amp;\sim Bern(p_y)
\end{aligned}$$`

Imagine we estimate two models: 

`$$\begin{aligned}
y &amp;= b_0 + b_1 x\\
y &amp;= g_0 + g_1 x + g_2 z
\end{aligned}$$`
]
.pull-right[

&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-17-1.png" alt="Scatterplot comparing simple and multiple logit coefficient estimates across simulations; points systematically deviate from the 45-degree reference line, illustrating non-collapsibility.  That is, adding a variable unrelated to x and y into the equation changes the coefficient relating x to y." width="90%" style="display: block; margin: auto;" /&gt;
]

---

## Highlights

1. In non-linear models (with fixed residual varainces), coefficients necessarily rescale when the specification changes (i.e., they are non-collapsible). 


---

## Marginal Effects do not Rescale? 




.pull-left[


**Simple**
`$$\begin{aligned}
y &amp;= b_0 + b_1 x\\
\frac{\partial Pr(y=1|x)}{\partial x} &amp;= f(b_0 + b_1x)b_1\\
\end{aligned}$$`



**Multiple**
`$$\begin{aligned}
y &amp;= g_0 + g_1 x + g_2 z\\
\frac{\partial Pr(y=1|x,z)}{\partial x} &amp;= f(g_0 + g_1x + g_2 z)g_1
\end{aligned}$$`
]

.pull-right[
&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-19-1.png" alt="Scatterplot comparing simple and multiple logit average partial derivatives across simulations, with a 45-degree reference line for equality. The result here is that partial derivatives, while not technically collapsible, are relatively stable to the addition or removal of a variable not related to x and y. " width="90%" style="display: block; margin: auto;" /&gt;


]

---

## Marginal Effects do not Rescale

.pull-left[
**Average First Differences**
`$$\begin{aligned}
X_0 &amp;= X_1 = X \\
X_0 &amp;: x \rightarrow x - \delta\\
X_1 &amp;: x \rightarrow x + \delta\\
p_0 &amp;= F(X_0\theta)\\
p_1 &amp;= F(X_1\theta)\\
\text{AFD} &amp;= \frac{1}{n}\sum_{i=1}^{n}(p_{1i}-p_{0i})
\end{aligned}$$`
]

.pull-right[
&lt;img src="lecture1_2026_files/figure-html/unnamed-chunk-20-1.png" alt="Scatterplot comparing simple and multiple logit average first differences across simulations, with points closer to the 45-degree equality line than the raw coefficient comparison.  As with partial derivatives, first differences, though not technically collapsible, are generally stable whether a variable unrelated to x and y is included or not." width="90%" style="display: block; margin: auto;" /&gt;


]

---

## Highlights

1. In non-linear models (with fixed residual varainces), coefficients necessarily rescale when the specification changes. 
2. Average marginal effects and average first differences do not rescale for irrelevant specification changes.

## Partial Robustness

Partial robustness considers robustness at different values of a or some variable(s).  

`$$\rho(\hat{\beta}_r)_j = \int_{\hat{\beta}_b - C\hat{\sigma}_b}^{\hat{\beta}_b + C\hat{\sigma}_b} f(\hat{\beta}_r|\mathbf{y}, \mathbf{X}=\mathbf{x}_j, \hat{\theta})d\hat{\beta}_r$$` 
where `\(\mathbf{x}_j\)` represents a vector of values at which robustness will be explored. 
- The result is robustness at a particular set of values which may change for a different set of values. 

---

## Partial Robustness of Gender by Race. 
.pull-left[
Run models and generate output to evaluate robustness


``` r
mod &lt;- glm(voted ~ age + educ + income + 
             poly(leftright, 2, raw=TRUE) + female + 
             race, data=dat, 
           family=binomial(link="logit"))
mod2 &lt;- glm(voted ~ age + educ + income + 
             poly(leftright, 2, raw=TRUE) + 
              female*race, data=dat, 
            family=binomial(link="logit"))

comps1 &lt;- avg_comparisons(mod, 
                      variables="female", 
                      by="race")
comps2 &lt;- avg_comparisons(mod2, 
                      variables="female", 
                      by="race")
```

]
.pull-right[

Get the simulation draws for each set of comparisons


``` r
draws1 &lt;- comps1 |&gt; 
  inferences(method="simulation") |&gt; 
  get_draws()

draws2 &lt;- comps2 |&gt; 
  inferences(method="simulation") |&gt; 
  get_draws()
```


Put the draws together in the same object


``` r
all_draws &lt;- bind_cols(draws1 |&gt;
                         select(draw_add = draw, race), 
                       draws2 |&gt; 
                         select(draw_mult = draw))
```
]

---

## Calculate Robustness

.pull-left[

``` r
all_draws |&gt;
  reframe(mean_add = mean(draw_add), 
          mean_mult = mean(draw_mult), 
          res = do.call(data.frame, 
                        as.list(robustness(draw_add, 
                                           draw_mult))), 
          .by=race) |&gt; 
  unnest_wider(res)
```
]
