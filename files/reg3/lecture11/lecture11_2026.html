## Today’s Robustness Question

- The nuisance functions relating the controls to the treatment and outcome are adequately modeled.

Why might this assumption fail?

- There may be unmodeled nonlinearities and interactions in the nuisance functions relating the controls to the treatment and outcome.

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- The nuisance functions relating the controls to the treatment and outcome are adequately modeled.

What are the limits of these tools?
- They do not solve omitted variable bias or endogeneity (inherently). 


---

## Recovering Treatment Effects

We want to estimate a **treatment effect** `\(\tau\)` in the model:

`$$Y_i = \tau D_i + g(\mathbf{X}_i) + \varepsilon_i$$`

- `\(Y_i\)` — outcome (vote share, conflict onset, support for policy...)
- `\(D_i\)` — treatment or variable of interest (could be continuous)
- `\(\mathbf{X}_i\)` — a vector of **controls** (possibly many)
- `\(g(\mathbf{X}_i)\)` — unknown function; we don't care about its form
- `\(\varepsilon_i\)` — idiosyncratic error, `\(\mathbb{E}[\varepsilon_i | D_i, \mathbf{X}_i] = 0\)`

--

**The Selection Equation**

`$$D_i = m(\mathbf{X}_i) + v_i$$`

where `\(m(\mathbf{X}_i) = \mathbb{E}[D_i | \mathbf{X}_i]\)` and `\(\mathbb{E}[v_i | \mathbf{X}_i] = 0\)`.

---

## Why Might Regression Adjustment Fail?

- nonlinear confounding
- interactions among controls
- many controls (`\(p \rightarrow n\)`)
- highly collinear controls
- unknown functional form

---

## The Key Theorem

**Frisch-Waugh-Lovell (FWL):** In OLS, the coefficient on `\(D\)` from

`$$Y = \tau D + \mathbf{X}\boldsymbol{\beta} + \varepsilon$$`

is **numerically identical** to `\(\hat{\tau}\)` from:

`$$\tilde{Y} = \tau \tilde{D} + \varepsilon$$`

where `\(\tilde{Y}\)` and `\(\tilde{D}\)` are the **residuals** from regressing `\(Y\)` and `\(D\)` on `\(\mathbf{X}\)`.

--

**Intuition:** OLS already "partials out" `\(\mathbf{X}\)` from both sides.
`\(\hat{\tau}\)` uses only the variation in `\(D\)` *unexplained* by the controls.

--

**DML generalizes this.** Instead of OLS projections, use any ML method to partial out `\(\mathbf{X}\)`.

---

## DML in one sentence

Classical regression removes confounding by fitting linear regressions for

`$$\begin{aligned}
Y &amp;= Xb + \tilde Y\\
D &amp;= Xg + \tilde D
\end{aligned}$$`

DML removes confounding by fitting flexible machine learning models for

`$$\begin{aligned}
Y &amp;= f(X) + \tilde Y\\
D &amp;= g(X) + \tilde D
\end{aligned}$$`

Everything else is about making inference valid.


---

## Why Not Just Use OLS with Many Controls?

When the number of controls `\(p\)` is large relative to `\(n\)`:

- OLS is **imprecise** (high variance, may be infeasible if `\(p &gt; n\)`)
- **Regularized regression** (LASSO, ridge) introduces **bias**

--

**Regularization bias problem (Belloni, Chernozhukov, Hansen 2014):**

If you run LASSO of `\(Y\)` on `\((D, \mathbf{X})\)`, LASSO may **drop** `\(D\)` or shrink `\(\hat{\tau}\)` toward zero even if `\(\tau \neq 0\)`.

Inference after model selection is **invalid** without corrections.

--

**Post-double-selection** (Belloni et al.) is one fix — but it requires LASSO specifically, and is sensitive to that choice.

---

## The Bias from Naïve Partialing Out

Suppose we run:

1. LASSO of `\(Y\)` on `\(\mathbf{X}\)` → residuals `\(\tilde{Y}\)`
2. LASSO of `\(D\)` on `\(\mathbf{X}\)` → residuals `\(\tilde{D}\)`
3. OLS of `\(\tilde{Y}\)` on `\(\tilde{D}\)` → `\(\hat{\tau}\)`

**What goes wrong?**

The nuisance estimates `\(\hat{g}(\mathbf{X}_i)\)` and `\(\hat{m}(\mathbf{X}_i)\)` have regularization error.
- This error is as big as ordinary sampling error and thus is not small enough to ignore. 

---

## The DML Estimator 

**Three steps:**

.pull-left[
**Step 1 — Partial out the outcome**

Estimate `\(\hat{g}(\mathbf{X}_i) = \widehat{\mathbb{E}}[Y_i | \mathbf{X}_i]\)` using any ML method.

`$$\tilde{Y}_i = Y_i - \hat{g}(\mathbf{X}_i)$$`

**Step 2 — Partial out the treatment**

Estimate `\(\hat{m}(\mathbf{X}_i) = \widehat{\mathbb{E}}[D_i | \mathbf{X}_i]\)` using any ML method.

`$$\tilde{D}_i = D_i - \hat{m}(\mathbf{X}_i)$$`
]

.pull-right[
**Step 3 — Recover `\(\tau\)`**

OLS of `\(\tilde{Y}\)` on `\(\tilde{D}\)`:

`$$\hat{\tau} = \left(\sum_i \tilde{D}_i^2\right)^{-1} \sum_i \tilde{D}_i \tilde{Y}_i$$`

**That's it.** The estimator is the FWL residual-on-residual regression, with ML doing the partialing.

]

???

The estimating equation for `\(\tau\)` is *insensitive* to small errors in `\(g\)` and `\(m\)`.

Small ML estimation errors in the nuisance functions **do not affect** `\(\hat{\tau}\)` to first order.

This is what buys us valid inference even when the ML models converge slowly.

---

## Cross-Fitting: The Other Key Ingredient

**Problem:** If we estimate `\(\hat{g}\)` and `\(\hat{m}\)` on the same sample we use for Step 3, overfitting creates a new bias.

**Solution: `\(K\)`-fold cross-fitting**

1. Split the sample into `\(K\)` folds (typically `\(K = 5\)`)
2. For each fold `\(k\)`:
   - Estimate `\(\hat{g}^{(-k)}\)` and `\(\hat{m}^{(-k)}\)` on the **other** `\(K-1\)` folds
   - Compute residuals `\(\tilde{Y}_i\)` and `\(\tilde{D}_i\)` for observations in fold `\(k\)`
3. Stack all residuals, run OLS

--

**Why it works:** Each observation's residual uses a model trained on *different* data.
Overfitting does not create systematic bias in the residuals.

Same logic as cross-validation — just applied to the partialing step.

---

## Assumptions

**1. Conditional ignorability (the usual one)**

`$$Y(d) \perp D \mid \mathbf{X} \quad \text{for all } d$$`

No unobserved confounders given `\(\mathbf{X}\)`. DML cannot partial out variables you didn't measure.

--

**2. The nuisance functions are estimable**

The ML models for `\(g(\mathbf{X})\)` and `\(m(\mathbf{X})\)` must converge **faster than `\(n^{-1/4}\)`**.

- LASSO achieves this under sparsity
- Random forests and boosting can achieve this under smoothness
- This is a *much* weaker requirement than `\(\sqrt{n}\)`-consistency

--

**3. Overlap**

`\(0 &lt; \mathbb{P}(D = 1 | \mathbf{X}) &lt; 1\)` for binary `\(D\)`.
(Or: `\(\text{Var}(D | \mathbf{X}) &gt; 0\)` for continuous `\(D\)`.)

---

# What DML Does Not Require

.pull-left[
**You do NOT need:**

- Correct specification of `\(g(\mathbf{X})\)`
- Correct specification of `\(m(\mathbf{X})\)`
- Sparsity (unless using LASSO)
- Knowledge of which controls matter
- Linear functional forms

]

.pull-right[
**You DO still need:**

- Selection on observables
- Enough data for ML to work
- The residualized treatment–outcome relationship must have the correct functional form.

]

---

## Machine Learning Models

There are a number of models you could uses as learners in the DML framework. We will discuss _Random Forests_ and _MARS_.
- Easy to use. 
- Not too many tuning parameters. 
- Pretty flexible. 
- Data requirements are not too heavy. 

Random forests use classification and regression trees to which we turn next. 

---

## Classification and Regression Trees (CART)

CART works in a decision-tree framework.


- Considering all independent variables, which dichotomization on one of them explains the most variance.

- Conditional on the previous *split*, which next dichotomization explains the most variance.

- Loss function is the well-known residual sum of squares.

- Continue until some fit is not improved (or the nodes/leaves get too small).

---

## Notation


`$$f(X_i) = T(X_i, \Theta)\equiv \sum_{b=1}^{B}c_{b}I(X_i \in R_b)$$`


- `\(T()\)` is a regression tree, with rules `\(\Theta\)` regarding tree depth, stopping rules, etc...

- `\(X_i\)` is the data.

- `\(c_b\)` is the predicted value in each of the `\(B\)` regions.

- `\(I()\)` is an indicator function.

- `\(R_b\)` defines the different regions in the space.

---

## Variance of RF Predictions

In addition to finding non-linearities and interactions (i.e., producing a low bias prediction), RF also attempts to produce a low-variance prediction, too. 

.pull-left[
`$$\operatorname{Var}\left(\frac{1}{M}\sum_{m=1}^M T_m\right) = \rho\sigma^2+\frac{1-\rho}{M}\sigma^2$$`

where

- `\(\sigma^2\)` is the variance of a typical tree,
- `\(\rho\)` is the average pairwise correlation between trees.
- If `\(\rho=0\)` (independence), then

`$$\operatorname{Var}=\frac{\sigma^2}{M}$$`
]
.pull-right[
so variance shrinks to zero as M grows.

- If \rho=1 (perfect correlation),

`$$\operatorname{Var}=\sigma^2$$`

and averaging accomplishes nothing.

In practice, `\(0&lt;\rho&lt;1\)`, so averaging still helps, but the residual variance is bounded below by `\(\rho\sigma^2\)`.
]

---

age.s &lt;- seq(20, 95, length=25)

           educ.s, 
           cartpred)

## (Lack of) Smoothness of CART Models

Problems with CART


- Not particularly smooth - step functions aren't great approximations for smooth curves (though they can do OK).

- No real means for inference here.  Bootstrapping can be problematic because the function is "non-regular" (small data changes can result in wild changes in the model)

- In more complicated models, it's difficult to figure out what effects look like.


---

# Ensemble Methods

Ensemble methods produce a bunch of `\((M)\)` trees to better fit `\(f(X)\)` and to prevent overfitting, with general form:

`$$f(X_i) = \sum_{m=1}^{M}T_{m}(X_i, \Theta_m)$$`

**Random Forests**

- Draw lots of random samples from the data
- In each random sample, fit a tree on a random subset of the variables
- Average across the trees `\(\hat{f}_{\text{bag}}(X_i) = \frac{1}{M}\sum_{m=1}^{M}T_m(X_i, \Theta_m)\)`

The effectiveness of ensemble averaging depends on the trees making different prediction errors.
- Highly correlated trees provide little benefit from averaging.
- Random Forests deliberately reduce the correlation among trees by randomly restricting the candidate predictors at each split.

# Random Forests
  
.pull-left[
CART approximates smooth functions using piecewise-constant regions, producing discontinuous prediction surfaces 
- RF is better at approximating smooth functions.

``` r
library(randomForest)
rfmod &lt;- randomForest(log(wages) ~ age+education, 
                      data=SLID, 
                      type="regression")

## Multivariate Adaptive Regression Splines (MARS)

.pull-left[
The main component of MARS is a pair of piecewise linear (hinge) splines.

`$$\begin{aligned}
(x-t)_{+} &amp;= \left\{\begin{array}{ll}
  x-t &amp; \text{ if } x &gt; t\\
  0   &amp;   \text{ otherwise.}
\end{array}\right.\\
(t-x)_{+} &amp;= \left\{\begin{array}{ll}
  t-x &amp; \text{ if } x &lt; t\\
  0   &amp;   \text{ otherwise.}
\end{array}\right.
\end{aligned}$$`
]
.pull-right[
&lt;img src="lecture11_2026_files/figure-html/hinge-1.png" alt="" width="90%" style="display: block; margin: auto;" /&gt;
]

---

## MARS Notation

MARS takes the form:

`$$f(x) = \beta_0 + \sum_{m=1}^{M} \beta_mh_m(x)$$`

where `\(h_m\)` is the pair of hinge functions.

Computationally:


- Forward pass - add pairs of hinge functions by reduction in SSRes until all pairs are in.

- Backward pass - take individual functions out by min increase in SSRes until GCV criterion is satisfied.



---

## Interactions


- The `degree` parameter in the R algorithm controls the degree of interaction you want to allow.

  
- This can make the model really complicated because it's expanding all possible interactions among hinge functions and then pulling them out on the backward pass step.

- This model is more easily constrained (particular w.r.t additivity) than the other models we talked about before.
  

- You can also identify variables that will enter the model linearly *if they enter the model at all *.

``` r

SLID &lt;- SLID %&gt;% 
  filter(!is.na(wages) &amp;
         !is.na(education) &amp; 
           wages &gt; 0)
emod &lt;- earth(log(wages) ~ age + 
                education, data=SLID, 
              degree=3)

## Choosing the ML Method

**The choice of ML for `\(\hat{g}\)` and `\(\hat{m}\)` does not affect the asymptotic distribution of `\(\hat{\tau}\)`** — as long as convergence is fast enough.

In practice, choose based on what you think fits the data generating process:

| If you believe... | Consider... |
|---|---|
| True model is sparse (few controls matter) | LASSO, elastic net |
| Many controls matter, nonlinear interactions | Random forest, MARS |
| Smooth effects, moderate `\(p\)` | Ridge regression, GAM |
| No strong prior | Try multiple, compare residuals |

**Practical tip from Ratkovic:** Check that `\(\tilde{D}\)` residuals are not too small — if `\(m(\mathbf{X})\)` predicts `\(D\)` almost perfectly, you have a weak "instrument" problem.

---

## Diagnostics to Run

**Before trusting your estimate:**

1. **Check residual `\(\tilde{D}\)`**: plot against `\(\mathbf{X}\)`. Should look like noise.
   If systematic patterns remain, your `\(\hat{m}\)` is not fitting well.

2. **Check residual `\(\tilde{Y}\)`**: same logic.

3. **Vary the ML method**: if `\(\hat{\tau}\)` changes a lot across choices, your nuisance models are not converging fast enough.

4. **Check overlap**: plot `\(\hat{m}(\mathbf{X}_i)\)` — extreme propensity scores indicate thin overlap regions.

---

## Robustness Workflow

A. Parametric GLM AME - Conventional applied baseline.

B. Parametric DML - Same controls, but DML/residualized response-scale estimand.

C. Flexible outcome DML - ML for `\(E[Y|X]\)`, parametric learner for `\(E[D|X]\)`.

D. Flexible treatment DML - Parametric learner for `\(E[Y|X]\)`, ML for `\(E[D|X]\)`.

E. Fully flexible DML - ML for both nuisance functions.

--

**Comparisons**
- A vs B tells how the DML partial linear model machinery changes the estimated treatment effect. 
- B vs D, E, F give a sense of how (and if so, where) flexible functional forms make a difference.

## Implementation in R: DML Models


``` r
library(DoubleML)     # or hdm, or build it manually
library(mlr3)
library(mlr3extralearners)

data_ml &lt;- DoubleMLData$new(SLID, y_col = "log_wages", d_cols = "male",
                             x_cols = c("education", "age", "language"))

pr &lt;- lrn("regr.lm")
pc &lt;- lrn("classif.logistic")
npr &lt;- lrn("regr.ranger")
npc &lt;- lrn("classif.ranger")

mod_a &lt;- lm(log_wages ~ sex + age + education + language, data=SLID)
mod_b &lt;- DoubleMLPLR$new(data_ml, ml_l = pr, ml_m = pc, n_folds=5)
mod_b$fit(store_predictions = TRUE)
