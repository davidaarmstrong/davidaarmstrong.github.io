- That we have estimated the appropriate functional form of the relationship between `\(x\)` and `\(y\)`. 

Why might this assumption fail?
- The estimated relationship is too restrictive. 
- The estimated relationship is overly complex when a simpler one is sufficient.
- The estimated relationship imposes shape constraints that are not supported by the data.

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That we have estimated the appropriate functional form of the relationship between `\(x\)` and `\(y\)`. 

What are the limits of these tools?
- Non-linear transformations and polynomials require arbitrary choice of power or basis dimension. 
- Dummy coding independent variables is only really possible for ordinal variables with relatively few levels. 
- Regression splines can be noisy. 
- Smoothing splines/GAMs require smoothing parameters to be chosen either arbitrarily or tuned from the data. 

--

Data-driven functional forms may fit the current sample well but fail to generalize to new data.

---

## Functional Form Assumptions. 

When estimating a parametric (linear) model, particularly when interested in the relationship between `\(x\)` and `\(y\)`, we estimate: 

`$$y_i = a + f(x_i) + f(\mathbf{z}_i) + e_i$$` 
Where: 
- `\(x\)` is a variable of interest
- `\(\mathbf{z}\)` is a vector of covariates. 

Generally `\(f(x)\)` is parametric e.g.,: 
- linear: `\(f(x) = b_1 x\)`
- log: `\(f(x) = b_1 \log(x)\)`
- quadratic: `\(f(x) = b_1 x + b_2 x^2\)` 

--

The precise choice of `\(f(x)\)` is usually guided by theory. 

---

## Functional Form Perturbations

We often want to identify how robust our functional form choices are to plausible alternatives. We can think of these from least to most complex. 

- Linear and flat: `\(f(x) = 0x\)`
- Linear and not flat: `\(f(x) = b_1 x\)`
- Non-linear, monotonic: `\(f(x) = b_1 \log(x)\)` or `\(f(x) = b_1 x^2\)`
- Non-linear, non-monotonic: `\(f(x) = b_1x + b_2x^2\)`
- Non-linear, flexible: `\(f(x)\)` estimate flexibly with minimal functional form assumptions. 

--

Robust conclusions are those that are not sensitive to choices of more complex models. 
- They may be sensitive to choosing simpler models, but if those simpler models fit worse the lack of robust is expected and unproblematic. 

---

## Robustness of Functional Forms

Not all robustness failures are equally important 

- If you hypothesize and fit a quadratic relationship, you expect it to be sensitive to choosing a linear or flat relationship instead. 
    - These _impose additional restrictions_ on the estimated relationship. 

- Conversely, if you hypothesize and fit a linear relationship and find that this choice is sensitive to fitting a quadratic relationship instead. 
    - This _relaxes a restriction_ - the quadratic model _could have found_ a linear relationship if that happened to best describe the relationships in the data. 

--

As a general principle, sensitivity to relaxing model restrictions combined with precise evidence for the alternative is often more concerning than sensitivity to imposing additional restrictions.

---

## Outline

We are going to proceed in a couple of different directions. 

1. Robustness testing for ordinal independent variables. 
    
    - Linear effect
    - Monotonic effect (relax equal spacing assumption)
    - Unrestricted categorical effect (relax ordinality assumption)
--

2. Robustness testing for continuous independent variables. 
    - Linear effect
    - Parametric non-linear effect (relax linearity assumption)
    - shape-constrained non-linear effect (relax parametric form assumption while retaining monotonicity)
    - Unrestricted non-linear effect (relax monotonicity assumption)

--

At each stage, we evaluate whether our conclusions survive the subsequent assumption relaxation. 

---
  
## Linearity and Multi-Category Variables

Nominal Variables `\(\rightarrow\)` Dummy Regressors `\(\rightarrow\)` 😄
--

The waters are a bit murkier for ordinal variables (e.g., state repression or political ideology).

- These variables are often operationalized with relatively few categories.
- However, we often have a strong suspicion that the relationship between these variables and the response is "roughly linear".

- If the relationship is *not* linear and we represent it with a line, then we are getting a *biased* estimate of the relationship.
- If the relationship could be represented linearly, and we represent it with a series of dummy regressors, we are getting estimates that are *inefficient*

---

## Robustness of the Linearity Assumption

Consider the model:

`$$	y = f(x) + g(\mathbf{Z}) + \varepsilon$$`

Often, we want to evaluate whether a linear approximation is sufficient.

`$$\begin{aligned}
\text{Target}:&amp; \quad f(x) = \beta_{0} + \beta_{1} x\\
\text{Alternative}:&amp; \quad f(x) \neq \beta_{0} + \beta_{1} x\quad \text{(i.e., the function is more complicated)}
\end{aligned}$$`
  
- We don't have to have know or specify the functional form of the alternative hypothesis, rather just that it is more complicated than linear.

---

## Target and Alternative Models

Switching from treating the variable as numeric to categorical allows us to estimate the linear, monotone (retaining monotonicity while relaxing the equal-spacing assumption) and unrestricted (relaxing the monotonicity assumption) categorical models. 

`$$\begin{aligned}
	\text{Target}:&amp; \quad f(x) = \beta_{0} + \beta_{1}x\\
	\text{Monotone}:&amp; \quad f(x) = \beta_{0} + \beta_{1}^{*}I(x = 2) + \beta_{2}^{*}I(x = 3) + \beta_{3}^{*}I(x = 4) + \beta_{4}^{*}I(x = 5)\\
	&amp;\quad \text{subject to:   }\quad 0\leq \beta_1^* \leq \beta_2^*\leq \beta_3^* \leq \beta_4^*\\
	\text{Unrestricted}:&amp; \quad f(x) = \beta_{0} + \beta_{1}^{*}I(x = 2) + \beta_{2}^{*}I(x = 3) + \beta_{3}^{*}I(x = 4) + \beta_{4}^{*}I(x = 5)
\end{aligned}$$`

where `\(I()\)` is an indicator function such that `\(I(\cdot)\)` is 1 if the expression inside is true and 0 otherwise. 

---


## An Example

I generated data such that `\(x_{i} \in \{1,2,3,4,5\}\)` and

`$$y_{i} = 2 + x + \varepsilon_{i}$$`

where `\(\varepsilon_{i} \sim N(0,2)\)`.

--

Since the effect in the alternative model is a function of multiple coefficients, we can evaluate the robustness of an effect plot. 


---

## Operationalizing Monotonicity. 

We take a "pooling adjacent violators" approach to imposing monotonicity.  It takes the following steps: 

1. Estimate the unconstrained model.  
2. Adjacent categories that violate the monotonicity constraint are pooled until a monotone relationship is obtained.
3. Repeat until all values have been evaluated. 

The resulting variable will be monotonically related to the outcome. 

--

The `make_mono_var()` function in the `nprobustness` package will do this for you.   

---

## Example Data

.pull-left[

``` r
# Generate data to be used in the example
set.seed(519)
x &lt;- rep(1:5, 100)
x &lt;- x[order(x)]
x_fac = as.factor(x)

y &lt;- 2 + .5*x + rnorm(500,0,5)

ex_df &lt;- data.frame(
  x = x, 
  x_fac = x_fac, 
  y= y
)

# run linear model
lmod &lt;- lm(y ~ x, data=ex_df)

# run unrestricted categorical model
umod &lt;- lm(y ~ x_fac, data=ex_df)

# make monotone x_fac variable: x_fac_ord
ex_df &lt;- make_mono_var(umod, ex_df,
  "x_fac", direction="up")

# run monotone model
mmod &lt;- lm(y ~ x_fac_ord, data=ex_df)
```


]
.pull-right[

``` r
library(marginaleffects)
library(nprobustness)
# make prediction data frame
pred_df &lt;- ex_df |&gt; 
  summarise(n = n(), 
            .by = c(x, x_fac, x_fac_ord)) |&gt; 
  mutate(x_fac = as.factor(x), 
         x_fac_ord = as.factor(x_fac_ord))

# calculate predictions for each model
# note - use the name of the original numeric variable
leff &lt;- predictions(lmod, 
    by="x", 
    newdata = pred_df)
meff &lt;- predictions(mmod, 
    by="x", 
    newdata = pred_df)
ueff &lt;- predictions(umod, 
    by = "x", 
    newdata = pred_df)

# save standard errors for each model's predictions
sd_leff &lt;- sqrt(diag(vcov(leff)))
sd_meff &lt;- sqrt(diag(vcov(meff)))
sd_ueff &lt;- sqrt(diag(vcov(ueff)))
```
]

## Calculating Robustness for Predictions

.pull-left[

``` r
# robustness of linear vs monotonic predictions
rob_lm &lt;- sapply(1:5, \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(leff)[i], 
                       sd = sd_leff[i]), 
    alt_args = list(mean = coef(meff)[i], 
                    sd = sd_meff[i])))

# robustness of linear vs unrestricted predictions
rob_lu &lt;- sapply(1:5, \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(leff)[i], 
                       sd = sd_leff[i]), 
    alt_args = list(mean = coef(ueff)[i], 
                    sd = sd_ueff[i])))

# robustness of monotone vs unrestricted predictions
rob_mu &lt;- sapply(1:5, \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(meff)[i], 
                       sd = sd_meff[i]), 
    alt_args = list(mean = coef(ueff)[i], 
                    sd = sd_ueff[i])))
```
]

## Calibrating Robustness Measures 

.pull-left[

Even though some of these values are bounded, we may not know what exactly to expect in any particular situation regarding the level of robustness.  

**What level of robustness would we expect?**

- A simulation can help.  

]
.pull-right[
**Simulation Steps**
1. Estimate baseline model. 
2. Use the original data, coefficients and error variance estimate to simulate `\(\tilde{y}\)`. 
3. Regress `\(\tilde{y}\)` on the linear `\(x\)` and the categorical `\(x^{(c)}\)`.  
4. Calculate robustness for the two models. 
5. Repeate `\(R\)` times and compare to the original robustness statistic. 

]


???

The simulation conditions on the estimated baseline model and the chosen perturbation. A more comprehensive simulation could repeatedly re-estimate the perturbation itself, thereby incorporating additional uncertainty arising from the model-building process.

---


## Simulation in practice. 

.pull-left[

``` r
library(parallel)
# function to simulate resposne
sim_resp &lt;- function(obj, ...){
  n &lt;- nobs(obj)
  sim_e &lt;- rnorm(n, 0, summary(obj)$sigma)
  X &lt;- model.matrix(obj)
  sim_y &lt;- X %*% coef(obj) + sim_e
  sim_y
}

# weights to gen average predictions
wts &lt;- pred_df$n/sum(pred_df$n)

# initialize new data
newdat &lt;- ex_df
# set seed
set.seed(48104)
```

]
.pull-right[

The next two blocks show one iteration, you'll have to wrap this in a loop or `lapply` to repeat. 

]

---

## Simulation Code

.pull-left[

``` r
# simulate response
newdat$sim_y &lt;- sim_resp(lmod)

# update models
lmod_up &lt;- update(lmod, sim_y ~ ., data=newdat)
umod_up &lt;- update(umod, sim_y ~ ., data=newdat)
mmod_up &lt;- update(mmod, sim_y ~ ., data=newdat)

# Calculate predictions
leff_up &lt;- predictions(lmod_up, by = "x", newdata = pred_df)
meff_up &lt;- predictions(mmod_up, by = "x", newdata = pred_df)
ueff_up &lt;- predictions(umod_up, by = "x", newdata = pred_df)

# Recover standard errors
sd_leff_up &lt;- sqrt(diag(vcov(leff_up)))
sd_meff_up &lt;- sqrt(diag(vcov(meff_up)))
sd_ueff_up &lt;- sqrt(diag(vcov(ueff_up)))
```
]
.pull-right[

``` r
# Calculate Robustness
rob_lm &lt;- sapply(1:5, \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(leff_up)[i], 
                       sd = sd_leff_up[i]), 
    alt_args = list(mean = coef(meff_up)[i], 
                    sd = sd_meff_up[i])))

rob_mu &lt;- sapply(1:5, \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(meff_up)[i], 
                       sd = sd_meff_up[i]), 
    alt_args = list(mean = coef(ueff_up)[i], 
                    sd = sd_ueff_up[i])))


# Make weighted average
c(c(rob_lm %*% wts), c(rob_lu %*% wts), c(rob_mu %*% wts))
```

## Monotonicity in GLMs

.pull-left[
For single equation models (binary, poisson, gamma, ordered), do the following: 

1. Create the unrestricted model with the appropriate GLM family. 
2. Save the model predictions on the link scale back into the data as `yhat_link`. 
3. Estimate a linear model of `yhat_link` on the unrestricted model formula. 
4. Do `make_mono_var()` on the model from 3 to create the variable of interest with monotonicity constraints. 
]

.pull-right[

``` r
library(foreign)
anes &lt;- rio::import("../data/anes1992.dta")
anesu &lt;- anes %&gt;% mutate(pid_fac = as.factor(pid)) |&gt; 
  drop_na(votedem, retnat, pid, age, male, 
          educ, black, south)
linmod &lt;- glm(votedem ~ retnat + pid + age + male + educ +
	black + south, data=anesu, family=binomial)

catmod &lt;- glm(votedem ~ retnat + pid_fac + age + male +
	 educ + black + south, data=anesu, family=binomial)

anesu$yhat_link &lt;- predict(catmod, type="link")
auxmod &lt;- lm(yhat_link ~ retnat + pid_fac + age + male +
	 educ + black + south, data=anesu)
anesu &lt;- make_mono_var(auxmod, anesu, mono_var = "pid_fac", direction="down")
pid_map &lt;- anesu |&gt; select(pid, pid_fac_ord) |&gt; distinct() |&gt; arrange(pid)
monmod &lt;- glm(votedem ~ retnat + age + male + educ + black + south + 
            recode_values(pid, from=pid_map$pid, to=pid_map$pid_fac_ord, ptype="factor"), 
            data=anesu, family=binomial)
```
]

---

## Robustness with GLMs 

The main differences with non-Gaussian GLMs are two-fold. 

1. The object of robustness analysis should generally be predicted probabilities, expected values, or first differences - quantities expressed on the observed outcome scale and thus comparable across specifications. 

2. The sampling distributions of these quantities are often not available in closed form or are poorly approximated by normal distributions. Consequently, robustness calculations are typically based on simulation, asymptotic approximations, or quasi-posterior draws rather than analytic probability distributions.

--

The steps are the same as before, but use `avg_predictions()` or `avg_comparisons()` instead of `predictions()` as above. 


---

## Predictions or First Differences?

Predictions:

* Bounded in (0,1)
* Near 0 or 1, uncertainty is often asymmetric and poorly approximated by a normal distribution.
* Predicted probabilities can frequently approach these boundaries (e.g., rare events).
* Robustness calculations are often best based on quasi-posterior draws.

Exception: When predictions are well away from the boundaries and uncertainty is small, normal approximations may be adequate for rapid evaluation.

--

First Differences:

* Bounded in (-1,1)
* Often lie well away from their boundaries, even when the underlying predictions do not.
* Uncertainty is frequently better approximated by a normal distribution.
* Delta-method standard errors are often adequate for robustness calculations, simulations can always be used for greater accuracy.

--

Exception: Simulation-based approaches remain preferable when first differences are large, highly nonlinear, or derived from extreme predicted probabilities.


---

## Robustness of Predictions

.pull-left[



``` r
# predictions from linear model
linpreds &lt;- avg_predictions(
  linmod, 
  variables = list(pid=1:7), 
  by="pid") |&gt; 
  inferences(method="simulation", R=5000)
lin_post &lt;- get_draws(linpreds)

# predictions from monotonic model
monpreds &lt;- avg_predictions(
  monmod, 
  variables = list(pid=1:7), 
  by="pid") |&gt; 
  inferences(method="simulation", R=5000)
mon_post &lt;- get_draws(monpreds)

# predictions from unrestricted model
catpreds &lt;- avg_predictions(
  catmod, 
  variables = "pid_fac", 
  by="pid_fac") |&gt; 
  inferences(method="simulation", R=5000)
cat_post &lt;- get_draws(catpreds)
```

]
.pull-right[

``` r
lp_mat &lt;- lin_post |&gt; select(drawid, pid, draw) |&gt; 
  pivot_wider(names_from = "pid", names_prefix="pid_", 
              values_from = "draw")
mp_mat &lt;- mon_post |&gt; select(drawid, pid, draw) |&gt; 
  pivot_wider(names_from = "pid", names_prefix="pid_", 
              values_from = "draw")
cp_mat &lt;- cat_post |&gt; select(drawid, pid_fac, draw) |&gt; 
  pivot_wider(names_from = "pid_fac", names_prefix="pid_", 
              values_from = "draw")
rob_lm &lt;- sapply(paste0("pid_", 1:7), \(x){
  robustness(lp_mat[[x]], mp_mat[[x]])
})
rob_lu &lt;- sapply(paste0("pid_", 1:7), \(x){
  robustness(lp_mat[[x]], cp_mat[[x]])
})
rob_mu &lt;- sapply(paste0("pid_", 1:7), \(x){
  robustness(mp_mat[[x]], cp_mat[[x]])
})
```

## Simulation Length

When using simulated values, people may wonder - _How many simulations do I need?_ 

Defaults: 
- Quick comparison - 2000 draws
- Reported in paper - 10000 + draws

--

More simulations are needed when trying to characterize quantities in the tail of a distribution. 
- Further out in the tail `\(\rightarrow\)` more draws. 
- Quantities based on extreme percentiles generally require more draws than quantities based on means or medians.

--

Speeding up `inferences(method="simulation")`
- Use "average" respondent rather than average effects/predictions.

## Robustness of First Differences. 

.pull-left[

``` r
lin_fd &lt;- avg_predictions(
  linmod, 
  variables = list(pid=c(1,3,4,6,7)), 
  hypothesis = ~sequential)

mon_fd &lt;- avg_predictions(
  monmod, 
  variables = list(pid=c(1,3,4,6,7)), 
  hypothesis = ~sequential)
cat_fd &lt;- avg_predictions(
  catmod, 
  variables = list(pid_fac=c("1", "3", "4", "6", "7")), 
  hypothesis = ~sequential) 

se_linfd &lt;- sqrt(diag(vcov(lin_fd)))
se_monfd &lt;- sqrt(diag(vcov(mon_fd)))
se_catfd &lt;- sqrt(diag(vcov(cat_fd)))
```

Contrasts are chosen to avoid transitions entirely within pooled monotone categories.
]

.pull-right[

``` r
robfd_lm &lt;- sapply(1:4, \(i)
  robustness(dnorm, dnorm, 
     target_args = list(mean = coef(lin_fd)[i], 
                        sd = se_linfd[i]), 
     alt_args = list(mean = coef(mon_fd)[i],
                     sd = se_monfd[i])))

robfd_mu &lt;- sapply(1:4, \(i)
  robustness(dnorm, dnorm, 
     target_args = list(mean = coef(mon_fd)[i], 
                        sd = se_monfd[i]), 
     alt_args = list(mean = coef(cat_fd)[i],
                     sd = se_catfd[i])))

robfd_lu &lt;- sapply(1:4, \(i)
  robustness(dnorm, dnorm, 
     target_args = list(mean = coef(lin_fd)[i], 
                        sd = se_linfd[i]), 
     alt_args = list(mean = coef(cat_fd)[i],
                     sd = se_catfd[i])))

colnames(robfd_lm) &lt;- colnames(robfd_mu) &lt;- 
  colnames(robfd_lu) &lt;- c("1 -&gt; 3", "3 -&gt; 4",

bc &lt;- rio::import("banda_casesse_rep/banda_casesse_data_postprocess.dta")
