## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That we have estimated the appropriate functional form of the relationship between `\(x\)` and `\(y\)`. 

Why might this assumption fail?
- The estimated relationship is too restrictive. 
- The estimated relationship is overly complex when a simpler one is sufficient.
- The estimated relationship imposes shape constraints that are not supported by the data.

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That we have estimated the appropriate functional form of the relationship between `\(x\)` and `\(y\)`. 

What are the limits of these tools?
- Non-linear transformations and polynomials require arbitrary choice of power or basis dimension. 
- Dummy coding independent variables is only really possible for ordinal variables with relatively few levels. 
- Regression splines can be noisy. 
- Smoothing splines/GAMs require smoothing parameters to be chosen either arbitrarily or tuned from the data. 

--

Data-driven functional forms may fit the current sample well but fail to generalize to new data.

---

## Functional Form Assumptions. 

When estimating a parametric (linear) model, particularly when interested in the relationship between `\(x\)` and `\(y\)`, we estimate: 

`$$y_i = a + f(x_i) + f(\mathbf{z}_i) + e_i$$` 
Where: 
- `\(x\)` is a variable of interest
- `\(\mathbf{z}\)` is a vector of covariates. 

Generally `\(f(x)\)` is parametric e.g.,: 
- linear: `\(f(x) = b_1 x\)`
- log: `\(f(x) = b_1 \log(x)\)`
- quadratic: `\(f(x) = b_1 x + b_2 x^2\)` 

--

The precise choice of `\(f(x)\)` is usually guided by theory. 

---

## Plausible Alternatives

These slides are largely focused on identifying _parametric_ plausible alternatives to linearity (or any baseline functional form).  

- We will use residual diagnostics to identify plausible departures from the baseline functional form.

- Some departures suggest non-linear transformations, while others suggest adding additional terms (e.g., polynomials) or moving to more flexible specifications.

--

Remember - robustness is about how conclusions fare in the face of _plausible_ perturbations of assumptions we make, not necessarily every possible perturbation. 

---

## Non-linearity

The assumption that the average error `\(E(\varepsilon)\)` is everywhere zero implies that the regression surface accurately reflects the dependency of `\(Y\)` on the `\(X\)`'s

- That is - we assume we've chosen the right functional form. 
    - Violating this assumption implies that the model fails to account for a systematic pattern between `\(Y\)` and the `\(X\)`'s

It is impossible to directly view the regression surface when more than two predictors are specified

- We can employ *partial residual plots* to assess non-linearity.

---

## Partial-Residual Plots (C+R plots)

For any linear model of `\(y\)` on `\(x\)` and `\(\mathbf{Z}\)`, `\(y_i = f(x_i) + g(\mathbf{z}_i) + e_i\)` the partial residual is: 

`$$r_i^{(x)} = \hat{f}(x_i) + \hat{e}_i$$`
- In a model linear in `\(x\)`, it would be `\(r_i^{(x)} = \hat{b}_x x_i + \hat{e}_i\)`
- For a model quadratic in `\(x\)`, it would be `\(r_i^{(x)} = \hat{b}_1 x_i + \hat{b}_2 x_i^2 + \hat{e}_i\)`

The "partial residuals" `\(r_i^{(x)}\)` are plotted versus `\(x\)`. 
- A non-parametric smooth (e.g., LOESS curve) helps identify the shape of the partial relationship between `\(x\)` and `\(y\)` with minimal functional form assumptions. 
- If the relationship is appropriately captured, the LOESS curve should follow `\(\hat{f}(x)\)` reasonably closely. 
- Systematic departures from `\(\hat{f}(x)\)` indicate potential unmodeled signal. 

???

If the C+R plot does not reveal systematic departures from the fitted relationship, then there is little empirical evidence motivating more flexible functional forms. In that case, nonlinear alternatives would typically need to be justified primarily by theory rather than by the data.

## LOESS 

LOESS (Local Regression) works in the following way: 

1. Pick a value of `\(x\)` at the lower edge of the distribution (e.g., the minimum) and call this `\(x_0\)`.  
2. Identify the _span_ percent of points closes to `\(x_0\)` on `\(x\)`. 
3. Estimate a weighted linear or polynomial regression of `\(y\)` on `\(x\)`, weighting points closer to `\(x_0\)` higher than points farther from `\(x_0\)`. 
4. Generate a prediction and from that model at `\(x_0\)` and mark that as `\(\hat{y}_0\)`.  
5. Move `\(x_0\)` to the right a little bit and repeat until you reach `\(max(x)\)`.  
6. Connect the predictions. 

The _span_ (0,1] controls the tradeoff between smoothness and flexibility.

- Larger spans `\(\rightarrow\)` smoother curves
- Smaller spans `\(\rightarrow\)` more flexible ("wigglier") curves


---


## Two Dimensions of Nonlinearity

To identify plausible alternatives, we need to know _what kind_ of unmodeled non-linearity exists.  There are two relevant evaluation criteria:

--

**Simple vs. Complex**
- Simple means the curvature of the function relating `\(x\)` to `\(y\)` does not change direction (i.e., there is no inflection point).
- Complex means that there is an inflection point.
	

**Monotone vs Non-monotone**
  - Monotone means that as `\(x\)` increases the function relating `\(x\)` to `\(y\)` never decreases or  `\(x\)` increases the function relating `\(x\)` to `\(y\)` never increases, depending on the nature of the function.

---

## Handling Non-linearity: Common Strategies

**Simple, monotone**

- Transformations of `\(Y\)` and/or `\(X\)`

**Complex Non-linearity**

- Polynomial Regression
- If pattern has too many turns, polynomials tend to oversmooth peaks
- Regression Splines
- More complicated non-parametric models.

## Ad hoc Transformations

Common transformations such as `\(\log(x)\)`, `\(\sqrt{x}\)`, or `\(x^2\)` are often useful starting points when investigating potential non-linearity.

- They correspond to familiar relationship shapes (e.g., diminishing returns, accelerating effects, or curvature).
- Many substantive theories imply one of these forms, either explicitly or implicitly.
- Because these transformations are widely used, their implications are generally easy to interpret and communicate.
- They provide a simple benchmark before moving to more flexible alternatives.

Some transformations (like `\(\log(x)\)`) will require `\(x\)` to be either non-negative or strictly positive.
---

## Inverse Hyperbolic Sine Transformation

.pull-left[
Sometimes, the log transform is not the most useful because a variable has lots of zeros and you don't want to add an arbitrary constant to all counts.  The IHS transformation is a good alternative.

`$$\begin{aligned}
\text{IHS}(x) &amp;= \frac{\text{sinh}^{-1}(\theta x)}{\theta}\\ 
&amp;= \frac{log\left(\theta x + log(\theta x^2+1)^{\left(\frac{1}{2}\right)}\right)}{\theta}
\end{aligned}$$`
]

&lt;img src="lecture4_2026_files/figure-html/ihs1-1.png" alt="Line plot of the inverse hyperbolic sine (IHS) transformation applied to X for three values of theta (0.25, 0.50, 1.00), shown as different line types. All three curves are symmetric around zero and log-like in shape; larger theta values produce a more pronounced compression of the tails relative to the center." width="90%" style="display: block; margin: auto;" /&gt;
]

## Robustness to the Log


.pull-left[

``` r
library(marginaleffects)
linpred &lt;- predictions(pmod, variables = 
  list(income = quantile(Prestige$income, 
                         probs=seq(0,1,by=.1))), 
  by = "income")
monpred &lt;- predictions(logmod, variables = 
  list(income = quantile(Prestige$income, 
                         probs=seq(0,1,by=.1))), 
  by="income")
se_linpred &lt;- sqrt(diag(vcov(linpred)))
se_monpred &lt;- sqrt(diag(vcov(monpred)))

rob_log &lt;- sapply(1:nrow(linpred), \(i)
  robustness(dnorm, dnorm, 
    target_args = list(mean = coef(linpred)[i], 
                       sd = se_linpred[i]), 
    alt_args = list(mean = coef(monpred)[i], 
                    sd = se_monpred[i])))
colnames(rob_log) &lt;- paste0("p", seq(0,1,by=.1)*100)
```

## Box-Tidwell transformation Example: Prestige Data

Sometimes, an ad hoc search may not produce a sufficiently plausible alternative.  In that case, the Box-Tidwell model may work.  It estimates the transformation parameters on the indicated variables.
  

``` r
library(car)
boxTidwell(prestige ~ income ,
           ~ education + women, data=Prestige)
```

```
##  MLE of lambda Score Statistic (t)  Pr(&gt;|t|)    
##        0.08073             -4.8338 5.021e-06 ***
## ---
## Signif. codes:  0 '***' 0.001 '**' 0.01 '*' 0.05 '.' 0.1 ' ' 1
## 
## iterations =  10
```

- The statistically significant test suggests that the linear specification may be overly restrictive and that a transformed version of income is a plausible robustness alternative.
- The MLE of Power suggests that income should be transformed by a power of 0.08 (suggesting the log might work well) 

---

## Comparing Candidate Transformations
  
The estimated power is approximately 0.08. The log transformation provides a very similar shape and is considerably easier to interpret.

- If the candidate transformation (e.g., the log instead of 0.08) is good enough, then the transformation powers on the new data should be insignificant.


``` r
boxTidwell(prestige ~ I(log(income) + 1),
           ~ education + women, data=Prestige)
```

```
##  MLE of lambda Score Statistic (t) Pr(&gt;|t|)
##         1.2727              0.9093   0.3655
## 
## iterations =  5
```

Notice that the p-value is `\(&gt;0.05\)` 
- The theoretically familiar log transformation approximates the estimated power transformation very well.
  
---

## Polynomial Regression

For non-linearity that is not simple and monotone, polynomials are a parametric alternative that may work. 

Two or more regressors of ascending power (i.e., linear, quadratic and cubic terms) are used to capture the effects of a single variable
- For every bend in the curve, we add another term to the model, going up in power each time. A polynomial of order `\(k\)` can have at most `\(k-1\)` turning points.
- Polynomial models are linear in the parameters even though they are non-linear in the variables

|Order | Equation |
|:---:|:---|
|First | `\(Y= \alpha + \beta_{1}X\)` |
|Second | `\(Y = \alpha + \beta_{1}X + \beta_{2}X^{2}\)` |
|Third  | `\(Y = \alpha + \beta_{1}X + \beta_{2}X^{2} + \beta_{3}X^{3}\)` |

## Extending the Workflow to GLMs


The same workflow applies:

1. Identify plausible alternatives.
2. Estimate alternative models.
3. Compare substantive quantities.
4. Evaluate robustness.

The only difference is that diagnostics and quantities of interest must be adapted to the GLM setting.


---

## Partial Residuals in GLMs

For a linear model:

`$$y_i=f(x_i)+g(\mathbf z_i)+e_i\quad \text{with}\quad r_i^{(x)}=\hat f(x_i)+\hat e_i$$`
--

For a GLM:

`$$g(\mu_i)=f(x_i)+h(\mathbf z_i)$$`

the residuals are no longer additive on the response scale.

Instead, we work on the linear predictor (link) scale

`$$\eta_i=g(\mu_i)$$`
So, `\(\hat{f}(x_i)\)` is `\(x\)`'s contribution to the linear predictor on the link scale. 

---

## Working Residuals

GLMs are estimated iteratively by repeatedly fitting approximate linear models.

The working residuals - `\(r_i^{(w)}\)` are the residuals from these local linear approximations.

`$$r_i^{(x)} = \hat{f}(x_i)+r_i^{(w)}$$`
Workflow after this is identical
- C+R plots tend to be noisier and may have unusual looking patterns, but they will still highlight unmodeled structure in the same way. 

---

## Box-Tidwell for GLMs

We can estimate the Box-Tidwell transformation in a GLM.  There is a function `glm_bt()` in the `nprobustness` package that does this.  The formula must contain a variable raised to the `lambda` power, e.g. `I(x^lambda)`.  Here's what the prestige example would look like: 


``` r
glm_bt(prestige ~ I(income^lambda) + women + education, 
       data = Prestige, width=6)
```

```
## Box-Tidwell Power Transformation
## ---------------------------------
## estimate    lower    upper 
##  0.08073 -0.20712  0.36743
```

## Functional Form Robustness Workflow
### Numeric Variables

1. Estimate baseline model.
2. Use C+R plot to identify unmodeled non-linearity. 
    - If simple &amp; monotone, non-linear transformations should be a plausible alternative. 
    - If not simple &amp; monotone, polynomials are a better place to find plausible alternatives. 
3. Evaluate robustness using predictions.
4. Describe the alternative relationships when robustness is low.

The plausible alternative model will identify which assumptions are violated - constant marginal effect and/or monotonicity.
