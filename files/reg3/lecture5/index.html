Data-driven functional forms may fit the current sample well but fail to generalize to new data.

## Functional Form Assumptions. 

When estimating a parametric (linear) model, particularly when interested in the relationship between `\(x\)` and `\(y\)`, we estimate: 

`$$y_i = a + f(x_i) + f(\mathbf{z}_i) + e_i$$` 
Where: 
- `\(x\)` is a variable of interest
- `\(\mathbf{z}\)` is a vector of covariates. 

In previous lectures, `\(f(x)\)` was pre-specified - we specified a particular functional form. 

In this lecture, we focus on some more flexible models for this task.

## Why Not Just Use More Polynomials?

If we want more flexibility, why not just use more polynomial terms? 

- High-order polynomials can oscillate.
- Local changes affect the entire curve.
- Difficult to interpret.

## Definition of Splines

Splines are: _piecewise regression functions that are constrained to join smoothly at points on the x-axis called knots_

- Rather than fitting a single relationship across the entire range of `\(x\)`, splines fit several local relationships.
- The knots determine where one local relationship gives way to another.
- The constraints ensure that the resulting function behaves as a single smooth curve rather than a collection of disconnected pieces.

---

## Constraining the Piecewise Linear Model

The problem with the linear interaction model is that it is _too_ flexible.  

`$$y = b_{0} + b_{1}x_{1} + b_{2}d + b_{3}x\times d + e$$`

This sets up two different equations: 

`$$y = \begin{cases}
 d = 0: &amp; b_0 + b_1x\\
 d = 1: &amp; (b_0 + b_2) + (b_1 + b_3)x
 \end{cases}$$`

We need to estimate both slopes, but if we want the lines to join at the knot value, the two model intercepts cannot both be free.  

---

## Constraining the Piecewise Linear Model 2

We heed the following to be true at knot location `\(k\)`: 

`$$\begin{aligned}
b_0 + b_1 k &amp;= (b_0 + b_2) + (b_1 + b_3)k\\
b_0 + b_1 k &amp;= b_0 + b_2 + b_1k + b_3k\\
b_0 - b_0 + b_1k -b_1k = b_2 + b_3k\\
-b_3k = b_2
\end{aligned}$$`

---

## Piecewise Linear Spline

Suppose we define a function as follows:

`$$(x-k)_{+} = \begin{cases}
x-k &amp; \text{ if } x &gt; k\\
0 &amp; \text{ Otherwise}
\end{cases}$$`

We then use that function of `\(x\)` in the model as well. 

`$$y = b_{0} + b_{1}x + b_{3}(x-60)_{+} + e$$`

This sets up essentially 2 equations:

`$$\begin{aligned}
   x \leq 60:&amp; y = b_{0} + b_{1}x\\
   x &gt; 60:&amp; y = b_{0} + b_{1}x + b_{3}(x-60) = (b_{0} + \underbrace{-b_{3}60}_{b2}) + (b_{1}+b_{3})x
\end{aligned}$$`

Notice that here we are only estimating 3 parameters, where the interaction would estimate 4 parameters.  Thus, this is a constrained version of the interaction.


---


## Fixing the Discontinuity


.pull-left[
Including `\(x\)` and `\((x-60)_{+}\)` as regressors, which generates the following predictions:


``` r
pwl &lt;- function(x, k)ifelse(x &gt; k, x-k, 0)

ggplot(mapping=aes(x=x, y=y)) + 
  geom_smooth(method="lm", 
              formula=y ~ x + pwl(x, 60)) + 
  geom_point() + 
  theme_minimal()
```
]

## Basis Functions

A basis function is really just a function that transforms the values of `\(x\)`. So, instead of estimating:

`$$y_i = \beta_0 + \beta_1x_i + \varepsilon_i$$`

we estimate:

`$$y_i = \beta_0 + \beta_1s_1(x_i) + \beta_2s_2(x_i) + \ldots +\beta_ks_k(x_i) + \varepsilon_i$$`

The basis functions `\(s_k(\cdot)\)` are known ahead of time (not estimated by the model).
- We can think of polynomials as basis functions where `\(s_j(x_i) = x_i^j\)`
- The piecewise linear function `\((x-k)_{+}\)` is also a basis function. 


---

<script>
(function () {
  var C1 = '#0072B2', C2 = '#E69F00', CF = '#222';
  var beta = [0, 1, 1];

  function b1(x) { return x; }
  function b2(x) { return x * x; }
  function fsum(x) { return beta[0] + beta[1] * b1(x) + beta[2] * b2(x); }

  function niceStep(lo, hi, n) {
    var r = Math.abs(hi - lo) / n;
    if (r < 1e-10) return 0.5;
    var e = Math.floor(Math.log(r) / Math.LN10);
    var f = r / Math.pow(10, e);
    return (f < 1.5 ? 1 : f < 3.5 ? 2 : f < 7.5 ? 5 : 10) * Math.pow(10, e);
  }

  function yRange(fns) {
    var lo = Infinity, hi = -Infinity;
    for (var i = 0; i <= 200; i++) {
      var x = -1 + 2 * i / 200;
      fns.forEach(function(fn) {
        var y = fn(x);
        if (isFinite(y)) { lo = Math.min(lo, y); hi = Math.max(hi, y); }
      });
    }
    if (!isFinite(lo)) { lo = -1; hi = 1; }
    var pad = Math.max(0.2, (hi - lo) * 0.15);
    return [Math.min(lo - pad, -0.1), Math.max(hi + pad, 0.1)];
  }

  function drawPlot(id, curves, ylo, yhi) {
    var cv = document.getElementById(id);
    if (!cv) return;
    var ctx = cv.getContext('2d');
    var W = cv.width, H = cv.height;
    var mg = { t: 8, r: 8, b: 28, l: 40 };
    var pw = W - mg.l - mg.r, ph = H - mg.t - mg.b;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f8f8f8';
    ctx.fillRect(mg.l, mg.t, pw, ph);

    function xp(x) { return mg.l + (x + 1) / 2 * pw; }
    function yp(y) { return mg.t + (1 - (y - ylo) / (yhi - ylo)) * ph; }

    var step = niceStep(ylo, yhi, 5);
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    var yg = Math.ceil(ylo / step - 1e-9) * step;
    while (yg <= yhi + 1e-9) {
      ctx.beginPath(); ctx.moveTo(mg.l, yp(yg)); ctx.lineTo(mg.l + pw, yp(yg)); ctx.stroke();
      yg += step;
    }
    [-1, -0.5, 0, 0.5, 1].forEach(function(xv) {
      ctx.beginPath(); ctx.moveTo(xp(xv), mg.t); ctx.lineTo(xp(xv), mg.t + ph); ctx.stroke();
    });
    ctx.setLineDash([]);

    if (ylo < 0 && yhi > 0) {
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mg.l, yp(0)); ctx.lineTo(mg.l + pw, yp(0)); ctx.stroke();
    }

    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
    ctx.strokeRect(mg.l, mg.t, pw, ph);

    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    [-1, -0.5, 0, 0.5, 1].forEach(function(xv) {
      ctx.fillText(xv === 0 ? '0' : xv.toFixed(1), xp(xv), mg.t + ph + 12);
    });
    ctx.fillText('x', mg.l + pw / 2, H - 1);
    ctx.textAlign = 'right';
    yg = Math.ceil(ylo / step - 1e-9) * step;
    while (yg <= yhi + 1e-9) {
      ctx.fillText(Math.abs(yg) < 1e-9 ? '0' : yg.toFixed(1), mg.l - 4, yp(yg) + 4);
      yg += step;
    }

    curves.forEach(function(c) {
      ctx.strokeStyle = c.color;
      ctx.lineWidth = c.lw || 2;
      ctx.setLineDash(c.dash || []);
      ctx.globalAlpha = c.alpha !== undefined ? c.alpha : 1;
      ctx.beginPath();
      var first = true;
      for (var i = 0; i <= 300; i++) {
        var x = -1 + 2 * i / 300;
        var y = c.fn(x);
        if (!isFinite(y)) { first = true; continue; }
        var px = xp(x), py = yp(Math.max(ylo - 0.5, Math.min(yhi + 0.5, y)));
        first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        first = false;
      }
      ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
    });
  }

  function update() {
    var wb1 = function(x) { return beta[1] * b1(x); };
    var wb2 = function(x) { return beta[2] * b2(x); };

    var yr1 = yRange([b1, b2, wb1, wb2]);
    drawPlot('bfd-c1', [
      { fn: b1,  color: C1, lw: 1.5, dash: [5, 3], alpha: 0.2 },
      { fn: b2,  color: C2, lw: 1.5, dash: [5, 3], alpha: 0.2 },
      { fn: wb1, color: C1, lw: 2.5 },
      { fn: wb2, color: C2, lw: 2.5 }
    ], yr1[0], yr1[1]);

    var yr2 = yRange([fsum, wb1, wb2]);
    drawPlot('bfd-c2', [
      { fn: wb1,  color: C1, lw: 1.5, dash: [5, 3], alpha: 0.35 },
      { fn: wb2,  color: C2, lw: 1.5, dash: [5, 3], alpha: 0.35 },
      { fn: fsum, color: CF, lw: 3 }
    ], yr2[0], yr2[1]);

    var sgn = function(v) { return v >= 0 ? '+' : ''; };
    document.getElementById('bfd-eq').innerHTML =
      'f(x) = ' + beta[0].toFixed(1) +
      ' <span style="color:' + C1 + '">' + sgn(beta[1]) + beta[1].toFixed(1) + 'x</span>' +
      ' <span style="color:' + C2 + '">' + sgn(beta[2]) + beta[2].toFixed(1) + 'x²</span>';
  }

  ['bfd-s0', 'bfd-s1', 'bfd-s2'].forEach(function(id, i) {
    var sl = document.getElementById(id);
    var vd = document.getElementById('bfd-v' + i);
    if (!sl) return;
    sl.addEventListener('input', function() {
      beta[i] = parseFloat(sl.value);
      vd.textContent = beta[i].toFixed(1);
      update();
    });
  });

  update();
}());

## Piecewise Polynomials

The piecewise linear model is useful in situations like the one we encounter here, but it is insufficiently flexible to capture a wide array of non-linear relationships.  Higher-order piecewise polynomials can. 

`$$y_i = \left\{\begin{array}{lc}
  \beta_{01} + \beta_{11}x_i + \beta_{21}x_i^2 + \beta_{31}x_i^3 + \varepsilon_i &amp; x_i &lt; c\\
  \beta_{02} + \beta_{12}x_i + \beta_{22}x_i^2 + \beta_{32}x_i^3 + \varepsilon_i &amp; x_i \geq c
\end{array}\right.$$`

Just as above though, these polynomials are unconstrained and can generate a discontinuity at the *knot* location `\(c\)`.

---

## Constraining the Piecewise Polynomial Model

To constrain the model, the splines are constructed:

- such that the first and second derivatives of the function continuous.

- Each constraint reduces the number of per-knot degrees of freedom used by one.

- In general, the model uses: Polynomial Degree `\(+\)` \# Knots `\(+\)` 1 (for the intercept) degrees of freedom


---

## Truncated Power Basis Functions

The easiest set of Spline functions to consider (for knot location `\(k\)`) are called truncated power functions, defined as:

`$$h(x, k) = (x - k)_{+}^{3} = \left\{\begin{array}{ll}(x-k)^{3} &amp; \text{if } x &gt; k\\ 0 &amp; \text{otherwise}\end{array}\right.$$`

When using these basis functions in, we put the full (i.e., global) parametric function in and a truncated power function of degree `\(n\)` for each knot.

---

## Other Spline Bases

The truncated power basis is useful for understanding how splines work.

In practice, other spline bases are often used:

- B-splines: numerically stable, local support.
- Natural splines: constrain behavior in the tails.
- Thin-plate splines: commonly used in GAMs.

--

All of these produce similar fitted functions.

The primary differences concern computational efficiency, numerical stability, and behavior at the boundaries.

---

## What Spline Choices Matter?

| Choice              | Typical Importance   |
|---------------------|----------------------|
| Knot Placement      | Usually Low          |
| Polynomial Degree   | Usually Low - 2 or 3 |
| Number of Knots     | Moderate             |
| Smoothing Parameter | High                 |

--

Simulation studies and practical experience suggest that cubic splines are generally sufficient and that knot placement is rarely critical.

The primary concern is controlling flexibility.

---

## Choosing the Number of Knots

More knots make the spline more flexible.

- Too few knots may miss important features of the relationship.
- Too many knots may fit noise rather than signal.

How should we choose?

--

One possibility is cross-validation.

---

## Cross-Validation

1. Randomly divide the data into k groups.
2. Fit the model using k-1 groups.
3. Predict the omitted group.
4. Calculate prediction error.
5. Repeat omitting the next group until every group has been omitted once.
6. Repeat steps 1–5 multiple times using different random partitions of the data and average the resulting prediction errors.

Choose the model with the lowest average prediction error.

_Idea:_ A good model should predict observations it has not seen.

---

## Cross-Validation and Robustness

Cross-validation does not tell us which model is "correct."

Instead, it helps identify a plausible level of complexity for the alternative model.

- Too little flexibility may miss meaningful structure.
- Too much flexibility may fit noise.

Cross-validation helps us avoid comparing our target model to an implausible alternative.


---


## Tidy CV

.pull-left[

``` r
cv_fun &lt;- function(split) {
  train &lt;- analysis(split)
  test  &lt;- assessment(split)

  mods &lt;- lapply(1:10, \(k) {
    q     &lt;- seq(0, 1, length.out = k + 2L)[-c(1L, k + 2L)]
    knots &lt;- quantile(train$x, q, na.rm = TRUE)
    lm(y ~ tpb(x, knot_loc = knots), data = train)
  })

  errs &lt;- lapply(mods, \(m) test$y - predict(m, newdata = test))

  tibble(
    sse     = sapply(errs, \(e) sum(e^2)),
    n       = nrow(test),
    n_knots = 1:10
  )
}
library(purrr)
library(rsample)
set.seed(519)
v &lt;- vfold_cv(df, v=5, repeats=250) |&gt;
  mutate(err = map(splits, cv_fun)) 
```

Looks like five knots is the best.

## Oil and Democracy Takeaways

1. There is clear non-linearity in a relatively narrow but well-supported region of the data.
    - The linearity assumption is not very robust in this region.
2. Global polynomial models would struggle to capture this pattern.
    - The non-linearity is localized rather than affecting the entire support of the variable.
3. Quantile-based knot placement allocates flexibility where the data are concentrated.
    - This is particularly useful for highly skewed variables.
4. While we can never know the true functional form, the observed non-linearity is unlikely to be pure noise.
    - Cross-validation selected a more flexible model based on out-of-sample predictive performance.
    - The non-linearity below approximately 0.5 is therefore supported by predictive evidence rather than in-sample fit alone.

---

## Why Not Stop at Regression Splines. 

Regression splines can be quite useful. Why do we need anything else?

- Regression splines can be inefficient, particularly when many knots are required to capture complex relationships.

- Regression splines require several analyst choices:

    - Number of knots
    - Location of knots

- These choices can be guided by theory and evidence, but they remain somewhat arbitrary.

    - The flexibility of the model is concentrated around the chosen knots.

    - Detecting localized non-linearity therefore depends, in part, on where those knots are placed.

---

## Smoothing Splines

.pull-left[
Smoothing splines mitigate these problems somewhat. 

- Use lots of knots (up to as many unique values of `\(x\)` as there are). 

- Control flexibility by penalizing excess curvature.  

]
.pull-right[

Consider the model: 

`$$\begin{aligned}
y_i &amp;= b_0 + b_1x_i + b_2 x_i^2 + b_3x_i^3 \\
&amp;+ \sum_{j=1}^{J}g_{j}(x_i-k_j)_+^3 + e_i
\end{aligned}$$`

where `\(J\)` is the total number of knots and `\(k_j\)` is the location of the `\(j^{th}\)` knot. 
- If `\(g_1 = \cdots = g_J = 0\)`, then the function is the global polynomial. 
- As the `\(g\)` coefficients depart from zero, they allow the fitted function to deviate from the global polynomial.

]

---

## Back to OLS

OLS solves the following: 

`$$\underset{b}{\text{arg min}}\sum_i^N(y_i - \mathbf{x}_{i}\mathbf{b})^2$$`

It finds the coefficients `\(\mathbf{b}\)` that minimize the residual sum of squares. 
- The only thing that matters is model fit subject to the constraint of linearity in the parameters. 

---

## Smoothing Splines 

.pull-left[
Smoothing splines solve a related, but more complex problem: 

`$$\underset{[b,g]}{\text{arg min}}\underbrace{\sum_i^N(y_i - \hat{y}_i)^2}_{\text{Lack of Fit}} + \underbrace{\lambda \int \lbrack f^{\prime\prime}(x)\rbrack^2 dx}_{\text{Wiggliness Penalty}}$$`

Where: 

- `\(\hat{y}\)` is defined as above 

`$$\begin{aligned}
\hat{y}_{i} &amp;=  b_0 + b_1x_i + b_2 x_i^2 + b_3x_i^3 \\
&amp;+ \sum_{j=1}^{J}g_{j}(x_i-k_j)_+^3
\end{aligned}$$`
]
.right-shift50[
- `\(\lambda\)` is a _tuning parameter_ that governs how much weight the penalty is given. 
    - `\(\lambda=0\)` recovers the unpenalized regression spline.  
    - Larger `\(\lambda\)` values mean smoother curves. 
    
- The smoothing spline nests the global polynomial. 
    - As `\(\lambda\)` increases, curvature becomes increasingly expensive and the fitted function becomes smoother.
    - In the limit, the spline approaches the lowest-curvature function available in the model space.
]

???

Regression splines control flexibility by limiting the number of knots, smoothing splines do so by penalizing curvature. 

---

## Who picks `\(\lambda\)`? 

We have replaced several modeling choices (number and location of knots) with a single smoothing parameter, `\(\lambda\)`.

**Methods for Choosing `\(\lambda\)`**

- (Generalized) Cross-validation
- Random effects shrinkage

---

## Generalized Additive Models

GAM extend smoothing splines to the multiple regression context. 

`$$y_i = b_0 + f(x_i) + g(z_i) + e$$`

In practice, GAM software:

- constructs spline bases,
- estimates smoothing parameters,
- applies smoothness penalties,
- returns fitted smooth functions.

---

## Estimating GAMs 

We will use the the `gam()` function from the `mgcv` package to estimate GAMs.  

- Use `method = "REML"` to estimate the smoothing parameters as random effects - currently preferred method. 
- Use `s(x)` to estimate a smooth for a variable. 
    - The argument `k` identifies the size of the basis (number of knots)
    - The argument `fx` is logical indicating whether the spline should be penalized (`FALSE`) or unpenalized (`TRUE`).

## Monotonicity in GAMs

In our previous lectures, we made a distinction between monotone non-linearity and non-monotone non-linearity.  
- We can relax the assumption of constant marginal effects in favor of something more flexible. 
- In many of the models we looked at above, the more flexible models permitted a wide range of non-monotone non-linear effects. 
- Sometimes we may want to relax the constant marginal effect assumption, but retain the monotonicity (or some other shape) assumption. 

--

Enter: Shape Constrained Addigive Models

---

## Shape-Constrained GAMs (SCAMs)

Sometimes theory tells us more than simply "the relationship is non-linear."

Theory may imply that the relationship is:

- Monotonically increasing
- Monotonically decreasing
- Convex
- Concave

--

Examples:

- Income and consumption should generally be non-decreasing.
- Education should not reduce literacy.
- State capacity should not decrease tax collection.

A Shape-Constrained Additive Model (SCAM) estimates a smooth function while enforcing these restrictions.

???

If these constraints are theoretically justified, allowing arbitrary non-linearity may generate implausible alternatives.

A Shape-Constrained Additive Model (SCAM) estimates a smooth function while enforcing these restrictions.

---

## SCAM Estimation and Interpretation

.pull-left[

``` r
library(scam)
mod_scam &lt;- scam(
  y ~ s(x, bs = "mpi"),
  data = dat
)
```

Possible values for `bs` are: 
- "mpi" - monotone increasing
- "mpd" - monotone decreasing
- "cx" - convex
- "cv" - concave

]
.pull-right[
The estimation procedure is similar to a GAM:

- Smoothness is still controlled by a penalty.
- Shape constraints restrict the space of allowable functions.
- The fitted function is the smoothest function that both fits the data and satisfies the constraint.
- Permits relaxing pre-specified functional form while retaining potentially theoretically important structure. 

]

## Oil and Democracy GAM Takeaways

##   &lt;chr&gt;  &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt; &lt;dbl&gt;
## 1 Spline 0.186 0.179 0.571 1.97 
## 2 SCAM   0.407 0.37  0.378 0.956
## 3 GAM    0.341 0.394 0.456 1.38
```


1. The original linear relationship has greater robustness with respect to the SCAM and GAM than regression splines . 
    - The local non-linearity does not feature in the GAM or SCAM relationships. 
2. The place where the relationships really differ are very sparse regions of the data. 
    - The main story survives - more oil production corresponds with lower levels of democracy.  
    - The levelling off/uptick at the highest levels of production has huge variance, so it is still not inconsistent with the original story - evidenced by a reasonably high overlap coefficient. 
3. Overall, the main substantive conclusion is reasonably robust: higher oil production is associated with lower democracy across most of the observed support.

???

The regression spline suggests a localized departure from linearity; the GAM suggests that once curvature is penalized, the strongest supported alternative is much smoother.

---

## Key Lesson

The goal is not to discover the "correct" functional form.

The goal is to determine whether substantive conclusions depend on plausible alternative functional forms.

- Linear models impose strong assumptions.
- Flexible models relax those assumptions (and introduce new ones). 
- Robust conclusions should survive across reasonable alternatives.

---

## Robustness Analyses Need Assumptions, Too

Robustness analyses often replace strong assumptions with weaker or different ones, but do not get rid of assumptions altogether.  

|         Model        |           Key Assumption         |
|:--------------------:|:--------------------------------:|
|   Linear             |   Constant marginal effect       |
|   Polynomial         |   Global shape                   |
|   Regression spline  |   Knot structure                 |
|   GAM                |   Smoothness penalty             |
|   SCAM               |   Smoothness + shape constraint  |

## Flexible Form Robustness Workflow
### Numeric Variables

1. Estimate baseline model.
2. If available, use a smoothing spline to identify plausible alternatives (SCAM and/or GAM). 
    - If smoothing splines are not available, use regression splines + CV for knot selection
3. Evaluate robustness using predictions or first differences.
4. Describe the alternative relationships when robustness is low.

The plausible alternative model will identify which assumptions are violated - constant marginal effect and/or monotonicity.
