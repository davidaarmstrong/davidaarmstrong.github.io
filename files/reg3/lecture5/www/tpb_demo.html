    var pad = Math.max(0.5, (hi - lo) * 0.12);

  // ---- Draw ----

  function drawPlot(id, curves, ylo, yhi, scatter, knots) {

    var mg = { t: 8, r: 8, b: 28, l: 36 };
    var pw = W - mg.l - mg.r, ph = H - mg.t - mg.b;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f8f8f8';
    ctx.fillRect(mg.l, mg.t, pw, ph);

    function xp(x) { return mg.l + x * pw; }
    function yp(y) { return mg.t + (1 - (y - ylo) / (yhi - ylo)) * ph; }

    var ystep = niceStep(ylo, yhi, 5);
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    var yg = Math.ceil(ylo / ystep - 1e-9) * ystep;
    while (yg <= yhi + 1e-9) {
      ctx.beginPath(); ctx.moveTo(mg.l, yp(yg)); ctx.lineTo(mg.l + pw, yp(yg)); ctx.stroke();

    [0, 0.25, 0.5, 0.75, 1].forEach(function (xv) {

    ctx.setLineDash([]);

      ctx.beginPath(); ctx.moveTo(mg.l, yp(0)); ctx.lineTo(mg.l + pw, yp(0)); ctx.stroke();

      ctx.setLineDash([3, 4]);
      knots.forEach(function (kn) {

      ctx.setLineDash([]);

    ctx.strokeRect(mg.l, mg.t, pw, ph);

    });
    ctx.fillText('x', mg.l + pw / 2, H - 1);

    ctx.textAlign = 'right';
    yg = Math.ceil(ylo / ystep - 1e-9) * ystep;
    while (yg <= yhi + 1e-9) {
      ctx.fillText(Math.abs(yg) < ystep * 0.01 ? '0' : yg.toFixed(Math.abs(yg) < 10 ? 1 : 0), mg.l - 3, yp(yg) + 3);

      ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;

  // ---- Legend ----

  function buildLegend(k) {
    var leg = document.getElementById('tpb-legend');
    leg.innerHTML = '';
    var knots = knotPos(k);

    function addItem(color, html) {
      var s = document.createElement('span');
      s.style.cssText = 'display:flex;align-items:center;gap:4px;';
      var sw = document.createElement('span');
      sw.style.cssText = 'display:inline-block;width:18px;height:2.5px;background:' + color + ';border-radius:2px;';
      s.appendChild(sw);
      var t = document.createElement('span');
      t.innerHTML = html;
      s.appendChild(t);
      leg.appendChild(s);
    }

    addItem(COLORS[1], '&beta;<sub>1</sub>&middot;x');
    addItem(COLORS[2], '&beta;<sub>2</sub>&middot;x&sup2;');
    addItem(COLORS[3], '&beta;<sub>3</sub>&middot;x&sup3;');
    knots.forEach(function (kn, i) {
      addItem(COLORS[4 + i], '&gamma;<sub>' + (i + 1) + '</sub>&middot;(x&minus;' + kn.toFixed(2) + ')<sub>+</sub><sup>3</sup>');
    });
    addItem('#222', 'f(x)');
  }

    if (idx === 3) return '&beta;<sub>3</sub>';
    var ki = idx - 4;
    return '&gamma;<sub>' + (ki + 1) + '</sub> (&xi;=' + knots[ki].toFixed(2) + ')';

        var lbl = document.createElement('span');
        lbl.innerHTML = sliderLabel(idx, knots);
        lbl.style.cssText = 'min-width:72px;color:' + (idx === 0 ? '#555' : color) + ';font-weight:' + (idx === 0 ? '400' : '500') + ';font-size:12px;';

        var sl = document.createElement('input');
        sl.type = 'range';
        sl.id = 'tpb-s' + idx;
        sl.min = cfg.lo; sl.max = cfg.hi; sl.step = cfg.step;
        sl.value = beta[idx] !== undefined ? beta[idx] : 0;
        sl.style.width = '90px';

        var vd = document.createElement('span');
        vd.id = 'tpb-v' + idx;
        vd.style.cssText = 'min-width:42px;text-align:right;font-size:12px;color:' + (idx === 0 ? '#555' : color) + ';';
        vd.textContent = (beta[idx] || 0).toFixed(1);

        sl.addEventListener('input', function () {
          beta[idx] = parseFloat(sl.value);
          vd.textContent = beta[idx].toFixed(1);
          update();
        });

        wrap.appendChild(lbl); wrap.appendChild(sl); wrap.appendChild(vd);
        container.appendChild(wrap);
      })(i);
    }
  }

  // ---- Update ----

  function update() {
    var knots = knotPos(nKnots);
    var nCoefs = 4 + nKnots;

    // Left panel: faint reference basis + weighted basis (skip intercept idx=0)
    var left = [];
    for (var i = 1; i < nCoefs; i++) {
      (function (idx, kn) {
        left.push({ fn: function (x) { return basisAt(x, kn)[idx]; }, color: COLORS[idx], lw: 1.5, dash: [5, 3], alpha: 0.18 });
      })(i, knots.slice());
    }
    for (var i = 1; i < nCoefs; i++) {
      (function (idx, kn) {
        left.push({ fn: function (x) { return (beta[idx] || 0) * basisAt(x, kn)[idx]; }, color: COLORS[idx], lw: 2.5 });
      })(i, knots.slice());
    }

    var fnsForRange = left.filter(function (c) { return !c.dash; }).map(function (c) { return c.fn; });
    var yr1 = fnsForRange.length ? yRange(fnsForRange) : [-1, 1];
    drawPlot('tpb-c1', left, yr1[0], yr1[1], null, knots);

    // Right panel: dashed weighted components + fitted curve over scatter
    var right = [];
    for (var i = 1; i < nCoefs; i++) {
      (function (idx, kn) {
        right.push({ fn: function (x) { return (beta[idx] || 0) * basisAt(x, kn)[idx]; }, color: COLORS[idx], lw: 1.5, dash: [4, 3], alpha: 0.45 });
      })(i, knots.slice());
    }
    right.push({ fn: ffit, color: '#222', lw: 3 });

    var ydata_lo = -5.2, ydata_hi = 12.2;
    var yr2 = yRange([ffit]);
    var y2lo = Math.min(ydata_lo, yr2[0]);
    var y2hi = Math.max(ydata_hi, yr2[1]);
    drawPlot('tpb-c2', right, y2lo, y2hi, { x: X, y: Y }, knots);
  }

  // ---- OLS solver ----

  function gaussElim(A, b) {
    var n = b.length;
    var M = A.map(function (row, i) { return row.slice().concat([b[i]]); });
    for (var col = 0; col < n; col++) {
      var best = col;
      for (var row = col + 1; row < n; row++) {
        if (Math.abs(M[row][col]) > Math.abs(M[best][col])) best = row;
      }
      var tmp = M[col]; M[col] = M[best]; M[best] = tmp;
      if (Math.abs(M[col][col]) < 1e-14) continue;
      for (var row = col + 1; row < n; row++) {
        var f = M[row][col] / M[col][col];
        for (var k = col; k <= n; k++) M[row][k] -= f * M[col][k];
      }
    }
    var x = new Array(n).fill(0);
    for (var row = n - 1; row >= 0; row--) {
      x[row] = M[row][n];
      for (var col = row + 1; col < n; col++) x[row] -= M[row][col] * x[col];
      x[row] /= M[row][row];
    }
    return x;
  }

  function fitOLS() {
    var knots = knotPos(nKnots);
    var p = 4 + nKnots;
    var n = X.length;
    var XtX = Array.from({length: p}, function () { return new Array(p).fill(0); });
    var Xty = new Array(p).fill(0);
    for (var i = 0; i < n; i++) {
      var b = basisAt(X[i], knots);
      for (var j = 0; j < p; j++) {
        Xty[j] += b[j] * Y[i];
        for (var l = 0; l <= j; l++) {
          XtX[j][l] += b[j] * b[l];
          XtX[l][j] = XtX[j][l];
        }
      }
    }
    return gaussElim(XtX, Xty);
  }

  function syncSliders() {
    var p = 4 + nKnots;
    for (var idx = 0; idx < p; idx++) {
      var sl = document.getElementById('tpb-s' + idx);
      var vd = document.getElementById('tpb-v' + idx);
      if (!sl || !vd) continue;
      var v = beta[idx] || 0;
      // Widen range if fitted value is outside current bounds
      if (v < parseFloat(sl.min)) sl.min = Math.floor(v * 1.2);
      if (v > parseFloat(sl.max)) sl.max = Math.ceil(v * 1.2);
      sl.value = v;
      vd.textContent = v.toFixed(1);
    }
  }

  // ---- Knot radio buttons ----

  document.querySelectorAll('input[name="tpb-k"]').forEach(function (radio) {
    radio.addEventListener('change', function () {
      nKnots = parseInt(radio.value);
      buildSliders(nKnots);
      buildLegend(nKnots);
      update();
    });
  });

  // ---- Fit / Reset buttons ----

  document.getElementById('tpb-fit').addEventListener('click', function () {
    var fitted = fitOLS();
    for (var i = 0; i < fitted.length; i++) beta[i] = fitted[i];
    syncSliders();
    update();
  });

  document.getElementById('tpb-reset').addEventListener('click', function () {
    beta = [5, 0, 0, 0, 0, 0, 0, 0, 0];
    syncSliders();
    update();
  });

  // ---- Init ----

  buildSliders(nKnots);
  buildLegend(nKnots);
  update();
}());
</script>
