## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation is appropriately specified.    

Why might this assumption fail?

- The estimated relationship is unconditional, but the effect varies across cases.
- The estimated relationship is moderated, but the unconditional relationship is also plausible.
- The estimated relationship is moderated, but the form of moderation is misspecified (e.g., wrong moderator, omitted moderator, or incorrect functional form).

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation is appropriately specified.    

What are the limits of these tools?
- Cannot search for moderators - a moderator must be proposed by the researcher. 
- Evidence for moderation is often low power.
    - Interaction effects are typically estimated much less precisely than average effects.
    - Reliable estimation requires sufficient support across combinations of x and the moderator.

---

## Effect Heterogeneity

Consider the following linear model: 

`$$y_i = b_0 + b_1 x_i + b_2 z_i + e_i$$`

In this model, the effect of `\(x\)` is: 

`$$\frac{\partial y}{\partial x} = b_1$$` 

The marginal effect is constant.

- In the previous lecture, we evaluated whether this assumption was reasonable across the values of `\(x\)`.
    - Is the effect of a one-unit change in `\(x\)` always the same regardless of the starting value?
- Here, we ask a related question:
    - Is the effect of `\(x\)` constant across the values of _other variables_?

---

## Mediation vs Moderation


.pull-left[
Moderation asks - does the direct effect of `\(X\)` vary by some other variable, `\(W\)`? 
- This is the effect heterogeneity of interest today. 

Mediation asks - is the effect of `\(X\)` direct and/or indirect through some other variable, `\(M\)`? 
- This is a related, but quite different question that we will not discuss today. 
]
.right-shift50[


&lt;img src="med_mod.png" alt="Two path diagrams stacked vertically. Top diagram labelled Mediation: X points to M (path a) and M points to Y (path b), with a dashed arrow from X directly to Y (path c-prime, the direct effect). Bottom diagram labelled Moderation: X points to Y with a solid arrow, and W points upward to the midpoint of the X-to-Y arrow, indicated by a filled square, showing that W moderates the effect of X on Y rather than transmitting it." width="90%" style="display: block; margin: auto;" /&gt;
]

## Moderation Effect

Suppose we are estimating a relationship between `\(y\)` and `\(x\)` and we suspect/hypothesize that relationship is moderated by `\(z\)`.  

.pull-left[
- We are really saying: 

`$$\frac{\partial y}{\partial x} = f(z)$$` 

The simplest `\(f(z)\)` would just be linear: 

`$$\frac{\partial y}{\partial x} = b_1 + b_2 z_i$$`
]
.pull-right[
What model would generate this marginal effect: 

`$$y_i = b_0 + b_1x_i + b_2x_iz_i + b_3 z_i + \mathbf{gw}_i + e_i$$`

The marginal effect of `\(x\)` from the above equation is `\(b_1 + b_2 z_i\)`. 
]

???

The interaction term determines how the effect of x changes across values of z. The main effect of z determines how the baseline level of y changes across values of z.

---

## Robustness Workflow for Moderation

1. Estimate the target (unconditional) model.
2. Estimate a plausible moderated alternative.
3. Evaluate evidence for moderation.
4. Characterize the variation in effects.
5. Assess whether substantive conclusions change.

_Typology of Models_



|Model              |Assumption Change                                   |
|:------------------|:---------------------------------------------------|
|Single interaction |Single effect varies across groups                  |
|Full interaction   |All effects vary across groups                      |
|Subgroup Analyses  |All effects + residual variances vary across groups |



---

## Interaction Effects 

We often denote product regressors `\(x_iz_i\)` as _interaction effects_.  

Ultimately we want to know two things:

- Is there statistical evidence of a moderated effect?
- How variable is the moderated effect? 
- Does the variation change or qualify the substantive conclusion? 

These last two questions get to the heart of the robustness discussion. 

Below, we walk through all the possible two-way interaction scenarios and we will discuss how to answer these questions.

---

# Two Categorical Variables

With two categorical variables, essentially you are estimating a different conditional mean for every pair of values across the two categorical variables. You could do that as follows:
.left-code[

``` r
library(DAMisc)
library(car)
data(Duncan)
Duncan &lt;- Duncan %&gt;% 
  mutate(
    inc.cat = cut(Duncan$income, 3), 
    inc.cat = factor(
      as.numeric(inc.cat), 
      labels=c("Low", "Middle", "High")))

mod &lt;- lm(prestige~ inc.cat * type + 
            education, data=Duncan)
```

## Evidence of Moderation

.pull-left[
We evaluate evidence of moderation by evaluating the moderated model agains the unconditional model: 


``` r
uncond_mod &lt;- lm(prestige~ inc.cat + type + 
            education, data=Duncan)
```

In this case, there is evidence of a moderated effect - `inc.cat`'s effect is moderated by `type` (and vice-versa).  

]
.pull-right[


``` r
anova(uncond_mod, mod, test="F")
```

```

## Two Categorical Summary

With these two categorical variables, the unconditional relationship fails to account for substantial heterogeneity across occupation types.
- The sensitive seems to vary by occupation type - WC sensitivity is low, but Professional sensitivity is quite high.  
- Also, the difference between High and Low income seems to be the most sensitive contrast with generally lower overlap coefficients within each occupation type.

## One Categorical + One Numeric

With one categorical variable, `\(d\)` (we'll use a binary variable here) and one numeric variable, `\(x\)`, we would have
 
`$$y_i = b_0 + b_1x_i + b_2 d_i + b_3x_id_i + e_i$$`

We can think of the moderation effect in two ways: 

.pull-left[

_Marginal Effect of `\(x\)`_
`$$\frac{\partial y}{\partial x} = b_1 + b_3 d$$`
]
.pull-right[

_Marginal effect of `\(d\)`_

`$$\frac{\partial y}{\partial d} = b_2 + b_3 x$$`

]

## Two Numeric Variables

With two numeric variables the interpretation gets a bit trickier.  For example, consider the following model:

`$$\hat{Y}_{i} = b_{0} + b_{1}X_{i1} + b_{2}X_{i2} + b_{3}X_{i3} + b_{4}X_{i1}X_{i2}$$`


We want to know the partial conditional effect of both `\(X_1\)` and `\(X_2\)`, but unlike above, neither can be boiled down to a small set of values.  Just think about the equation:

`$$\begin{aligned}
\frac{\partial \hat{Y}}{\partial X_{1}} &amp;= \beta_{1} + \beta_{4}X_{2}\\
\frac{\partial \hat{Y}}{\partial X_{2}} &amp;= \beta_{2} + \beta_{4}X_{1}
\end{aligned}$$`


Note, that `\(\beta_4\)` is the amount by which the *effect* of `\(X_1\)` goes up for every additional unit of `\(X_2\)` and the amount by which the *effect* of `\(X_2\)` goes up for every additional unit of `\(X_1\)`.

---

## Testable Hypotheses

`$$\hat{Y}_{i} = b_{0} + b_{1}X_{i1} + b_{2}X_{i2} + b_{3}X_{i3} + b_{4}X_{i1}X_{i2}$$`
Berry, Golder and Milton (2012) suggest that we should be able to test 5 hypotheses:

.small[
- `\(\mathbf{P}_{X_{1}|X_{2}=\text{min}}\)` The marginal effect of `\(X_{1}\)` is [positive, zero, negative] when `\(X_{2}\)` takes its lowest value.
- `\(\mathbf{P}_{X_{1}|X_{2} = \text{max}}\)` The marginal effect of `\(X_{1}\)` is [positive, zero, negative] when `\(X_{2}\)` takes its highest value.
- `\(\mathbf{P}_{X_{2}|X_{1}=\text{min}}\)` The marginal effect of `\(X_{2}\)` is [positive, zero, negative] when `\(X_{1}\)` takes its lowest value.
- `\(\mathbf{P}_{X_{2}|X_{1} = \text{max}}\)` The marginal effect of `\(X_{2}\)` is [positive, zero, negative] when `\(X_{1}\)` takes its highest value.
- `\(\mathbf{P}_{X_{1}X_{2}}\)` The marginal effect of each of `\(X_{1}\)` and `\(X_{2}\)` is [positively, negatively] related to the other variable.
]


---

## Example


``` r
data(Prestige, package="carData")
Prestige$income &lt;- Prestige$income/1000
addmod &lt;- lm(prestige ~ income + education + type, data=Prestige)
intmod &lt;- lm(prestige ~ income*education + type, data=Prestige)
tidy(intmod)
```

# Is Moderation a Plausible Alternative?

- The `income:education` line answers this question.  If it is significant, then there is a significant interaction, otherwise there is not.

- This is counter to a minor, though still influential, point in Brambor, Clark and Golder (2006), but is consistent with Berry, Golder and Milton (2012).

- The interaction provides evidence that moderation is a plausible alternative specification, so we evaluate robustness to it.

---

## Robustness

.pull-left[

``` r
# Income Robustness
add_slopes_inc &lt;- slopes(addmod, 
   newdata=datagrid(education = 
      seq_range(Prestige$education, 10)), 
   variables="income", by="education")
int_slopes_inc &lt;- slopes(intmod, 
   newdata=datagrid(education = 
      seq_range(Prestige$education, 10)), 
   variables="income", by="education")
rob_inc &lt;-map_df(1:10, \(i)
 robustness(dnorm, dnorm, 
    target_args = list(
      mean = add_slopes_inc$estimate[i], 
      sd = add_slopes_inc$std.error[i]), 
    alt_args = list(
      mean = int_slopes_inc$estimate[i], 
      sd = int_slopes_inc$std.error[i]))) |&gt; 
  mutate(education = add_slopes_inc$education, 
         .before="ovl")
```
]

``` r

## Conditional Effect + Robustness

---


# Interpretation


- The effect of income is nearly always significant, though it gets smaller as education gets bigger.  That is, as education increases, we expect smaller increases in prestige from increasing income

- The effect of education is significant and positive until around 16,000 dollars, which is around 2/3 the range of `income`, but is the `\(96^{th}\)` percentile because of the skewness of income.

- This suggests that people tend to derive prestige from either higher incomes or higher education, but not really both.

## Berry, Golder and Milton Test

BGMtest(intmod, vars = c("income", "education"))

# When Confidence Bounds Equal Zero

You may want to know when the confidence bounds are equal to zero.  Consider the equation:

`$$\hat{Y}_{i} = \beta_{0} + \beta_{1}X_{i1} + \beta_{2}X_{i2} + \beta_{3}X_{i3} + \beta_{4}X_{i1}X_{i2}$$`


- We know that the conditional effect of `\(X_1\)` is `\(\beta_1 + \beta_4X_2\)` and that the lower bound is `\((\beta_1 + \beta_4X_2) - 1.96\times SE(\beta_1 + \beta_4X_2)\)`.

- Since those are all quantities that we know (or estimate), we could set it equal to zero and solve.

- This is what the `changeSig` function does.

## 3-D Surface

.pull-left[

``` r
inc_seq &lt;- seq_range(Prestige$income, 25)
ed_seq &lt;- seq_range(Prestige$education, 25)

pred_3d &lt;- function(model, variables, ...){
  d &lt;- marginaleffects::datagrid(model = model, 
                                 grid_type = "mean_or_mode")
  o &lt;- outer(variables[[1]], variables[[2]], 
        Vectorize(function(x,y){
          d[[names(variables)[1]]] &lt;- x
          d[[names(variables)[2]]] &lt;- y
          predict(model, newdata=d)
        }))
  md &lt;- insight::get_data(model)
  ch &lt;- geometry::convhulln(md[,names(variables)])
  inch &lt;- outer(variables[[1]], variables[[2]], 
                Vectorize(function(x,y)geometry::inhulln(ch, matrix(c(x,y), nrow=1))))
  o_in &lt;- o
  o_in[which(!inch, arr.ind=TRUE)] &lt;- NA
res &lt;- list(variables[[1]], variables[[2]], predictions=t(o), predictions_inhull = o_in)
names(res)[1:2] &lt;- names(variables)
return(res)
  }

preds &lt;- pred_3d(intmod, 
        variables = list(education = ed_seq, 
                         income = inc_seq))

## Robustness of Predictions

.pull-left[
The colored tiles are present for values in the convex hull.  
- There are small, disconnected regions of high robustness. 
]
.right-shift50[
&lt;img src="lecture6_2026_files/figure-html/unnamed-chunk-23-1.png" alt="Tile plot with education on the x-axis and income (in thousands of dollars) on the y-axis, covering only the region within the convex hull of observed Prestige data. Each tile is shaded light, medium, or dark purple corresponding to High, Moderate, or Low overlap coefficient between the additive and interaction model predictions at that education-income combination. Most of the occupied region is shaded Low or Moderate, with small disconnected patches of High robustness concentrated at low-income, mid-education values, indicating that the interaction model produces meaningfully different predictions from the additive model across most of the observed data support." width="90%" style="display: block; margin: auto;" /&gt;
]

## Full Interaction Model

.pull-left[
The fully interactive model would interact all variables with a grouping variable: 


``` r
library(broom)
data(Prestige, package="carData")
Prestige$income &lt;- Prestige$income/1000

fi_mod &lt;- lm(prestige ~ (income + education)*type, 
             data=Prestige)
slopes(fi_mod, 
       by="type") |&gt; 
  filter_out(term == "type") |&gt; 
  as_tibble() |&gt; 
  select(type, term, estimate, std.error)
```

## Simulation

.pull-left[
Most of the coefficients are quite sensitive to the no moderation assumption. 
- Income for White Colloar and Education for Professional incomes appear to be about what we would expect if the additive model is true.  
- The other effects have overlap coefficients significantly lower than we would expect if the additive model were, in fact, true. 
]
.pull-right[
&lt;img src="lecture6_2026_files/figure-html/unnamed-chunk-26-1.png" alt="Faceted binned ridge histogram with two panels side by side, one for income and one for education. Within each panel, occupation types (bc, prof, wc) are arranged on the y-axis. Gray bars show the simulated distribution of overlap coefficients under the additive null model; red points mark the observed overlap coefficient from the actual data. For income, the observed overlap for blue-collar and professional occupations falls well below the bulk of the simulated distribution, indicating robustness substantially lower than expected under the additive model; white-collar income overlap is closer to the centre of its distribution. For education, professional and blue-collar observed overlaps again fall in the lower tail of the simulated distributions, while white-collar education overlap sits near the centre, consistent with the conclusion that the full interaction model reveals genuine heterogeneity for most groups." width="100%" style="display: block; margin: auto;" /&gt;
]

## Subgroup Analysis

.pull-left[
Sometimes, people prefer estimating subset models - it makes interpretations a bit easier immediately. 

Subgroup analysis relaxes other assumptions: 
- all effects vary by group. 
- residual variances differ.
