## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation in non-linear GLMs is appropriately specified.    

Why might this assumption fail?

- The nature of the conditional relationship is not appropriately captured by the model's form. 
- The model imposes conditionality that is not really there.

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation in non-linear GLMs is appropriately specified.    

What are the limits of these tools?
- In essence, all variables are moderators - which to investigate?
- Evidence for moderation is often low power.
    - Interaction effects are typically estimated much less precisely than average effects.
    - Reliable estimation requires sufficient support across combinations of x and the moderator.

---

## Transition from Linear to GLM

Consider a linear model: `\(y = b_0 + b_1x + b_2z + e\)`
- The effect of `\(x\)` is `\(\frac{\partial y}{\partial x} = b_1\)`

In the non-linear model: `\(E(y|x,z) = g^{-1}(b_0 + b_1x + b_2z) =  g^{-1}(\eta)\)`
- The effect of `\(x\)` is 

`$$\frac{\partial g^{-1}(\eta)}{\partial x} = \frac{\partial g^{-1}(\eta)}{\partial \eta}\frac{\partial \eta}{\partial x}$$`

---

## Common Links and First Derivatives

| Model | Response Function | Effect of `\(x\)` |
|---------|---------|---------|
| Linear | `\(E(Y)=\eta\)` | `\(\beta_x\)` |
| Binary | `\(p=F(\eta)\)` | `\(\beta_x f(\eta)\)` |
| Log-Link | `\(\mu=e^\eta\)` | `\(\beta_x \mu\)` |
| Ordered | `\(P(Y=k)=F(\tau_k-\eta)-F(\tau_{k-1}-\eta)\)` | `\(\beta_x[f(\tau_{k-1}-\eta)-f(\tau_k-\eta)]\)` |
| Multinomial Logit | `\(p_k=\frac{e^{\eta_k}}{\sum_j e^{\eta_j}}\)` | `\(p_k\left(\beta_{xk}-\sum_j p_j\beta_{xj}\right)\)` |

where

- `\(F(\cdot)\)` is a cumulative distribution function (CDF)
- `\(f(\cdot)=F^{\prime}(\cdot)\)` is the corresponding probability density function (PDF)

---

## Binary Model Example

Consider the binary regression model: 

`$$\log\left(\frac{p}{1-p}\right) = b_0 + b_1x + b_2z$$`

The effect of `\(x\)` is: 

$$\frac{\partial E(y|x,z)}{\partial x} = f(\eta)b_1 = p(1-p)b_1 $$


Because `\(p\)` depends on all predictors, the effect of `\(x\)` changes across values of `\(x\)` and `\(z\)`.

## Link vs Product Term Conditionality

Mechanical conditionality that comes from the non-linear link: 
- _can_ dampen or amplify the coefficient of `\(x\)` as a function of `\(z\)`.
- _cannot_ allow a coefficient to change signs. 

Including a product term: 
- _can_ permit sign flips based on different values of the conditioning variable. 
- _can_ reduce the level of conditionality between `\(x\)` and `\(z\)` in some circumstances. 

---

## Link vs Product Term Conditionality

If `\(E(y|x,z) = g^{-1}(b_0 + b_1x + b_2z)\)`

`$$\frac{\partial g^{-1}(\eta)}{\partial x} = \frac{\partial g^{-1}(\eta)}{\partial \eta}b_1$$`

If `\(E(y|x,z) = g^{-1}(b_0 + b_1x + b_2z + b_3xz)\)`

`$$\frac{\partial g^{-1}(\eta)}{\partial x} = \frac{\partial g^{-1}(\eta)}{\partial \eta}(b_1 + b_3z)$$`
---

## Conditionality in GLMs

If the model induces conditionality by definition, how do we think about moderation? 

1. Just as before - generally, an investigation about conditionality should be theoretically interesting. 
    - At this stage, you should not go "hunting for" interactions.  
2. Unlike before, the mechanical model building exercise does not lead to clear, immediate answers. 
    - Whether the product term is significant and the extent of the moderation are less related here. 
3. Whether a product term belongs in the model depends on whether it generates substantively important conditionality beyond the mechanical conditionality induced by the link function.
    
---

## Evaluating Conditionality


| Variable Types | Marginal Effect of `\(x\)` | Interaction Quantity |
|---------------|-------------------------|----------------------|
| `\(x,z\)` both continuous | `\(\frac{\partial E(Y)}{\partial x}\)` | `\(\frac{\partial}{\partial z}\frac{\partial E(Y)}{\partial x}\)` |
| `\(x\)` continuous, `\(z\)` binary | `\(\frac{\partial E(Y)}{\partial x}\)` | `\(\Delta_z\left(\frac{\partial E(Y)}{\partial x}\right)\)` |
| `\(x,z\)` both binary | `\(\Delta_x E(Y)\)` | `\(\Delta_z\left(\Delta_x E(Y)\right)\)` |

--

Finite Difference Approximation for 1 - interquartile change in marginal effects: 

`$$\frac{\partial}{\partial z}\frac{\partial E(Y)}{\partial x} \approx \frac{
\left.\frac{\partial E(Y)}{\partial x}\right|_{z=P_{75}} -
\left.\frac{\partial E(Y)}{\partial x}\right|_{z=P_{25}}}
{P_{75}-P_{25}}$$`

## Example: ANES Voting Democrat

.pull-left[

``` r
anes &lt;- rio::import("../data/anes1992.dta")
anesu &lt;- anes |&gt;  
  mutate(retnat = rio::factorize(retnat), 
         educ = rio::factorize(educ)) |&gt;
  drop_na(votedem, retnat, pid, age, male,
          educ, black, south)
add_mod &lt;- glm(votedem ~ retnat + pid + age + male + educ +
                black + south, data=anesu, family=binomial)
tidy(add_mod)
```

```

## Effect Heterogeneity in GLMs. 

In non-linear GLMs, robustness to effect heterogeneity is really two questions (or two different sets of assumptions). 

1. Is the functional form as estimated adequate (i.e., is a product term needed if not already included)? 
2. Do the effects interestingly by subgroup? 

**Robustness Evaluation**

| Instability Type | Interpretation |
|------------------|----------------|
| `\(\overline{ME}^{(a)}_x \not\approx \overline{ME}^{(a)}_x(z_0)\)` | Population effect is not representative of subgroup `\(z_0\)` |
| `\(\overline{ME}^{(a)}_x(z_0) \not\approx \overline{ME}^{(p)}_x(z_0)\)` | Conclusions depend on whether moderation is explicitly modeled |
| `\(\overline{ME}^{(a)}_x \not\approx \overline{ME}^{(p)}_x(z_0)\)` | Overall substantive conclusion is not robust |

---

## Robustness Workflow

1. Estimate the baseline model. 
    - Compute overall effect (average first difference or first derivative)
2. Identify plausible subgroups
3. Estimate one or more alternative specifications
    - Single interaction effect
    - Full interaction effect
    - Subgroup Models
4. Compare baseline and subgroup effects. 
    - Evaluate robustness statistics. 
    - Evaluate changes in substantive conclusions. 
    - Consider whether any observed instability is larger than expected.

## Separation

In subgroup analyses, as samples get small, separation problems are more likely.  In these cases, finite maximum likelihood estimates may not exist.

If some linear combination of the predictors perfectly predicts the outcome,

$$
P(Y=1 \mid \mathbf{x}) =
`\begin{cases}
1 &amp; \text{for one region of the predictor space}\\
0 &amp; \text{for another}
\end{cases}`
$$

then the likelihood can always be increased by making one or more coefficients arbitrarily large.

---

## Consequences of Separation

- Coefficient estimates diverge toward `\(\pm\infty\)`
- Standard errors become enormous
- Wald confidence intervals are meaningless
- The model often fails to converge
- Predictions may be numerically unstable

.pull-left[
### Complete separation

Every success lies on one side of a threshold and every failure on the other.
]

.pull-right[
### Quasi-complete separation

Only a few observations violate the perfect split, but the likelihood surface is still nearly flat.
]

.bottom-note[
Separation becomes increasingly common with small samples, rare events, and many indicator variables.
]

---

## Firth's Logistic Regression

Instead of maximizing the ordinary likelihood,

$$
\ell(\boldsymbol{\beta}),
$$

Firth (1993) maximizes the *penalized* likelihood

$$
\ell^*(\boldsymbol{\beta})
=
\ell(\boldsymbol{\beta})
+\frac12\log |I(\boldsymbol{\beta})|,
$$

where `\(I(\boldsymbol{\beta})\)` is the Fisher information matrix.

---

## Intuition

The penalty acts like a weak amount of prior information that shrinks estimates away from infinity.

As a result,

- finite coefficient estimates always exist
- first-order small-sample bias is removed
- confidence intervals behave much better
- predictions are typically more stable than ordinary MLE

### When should you use it?

- Separation or quasi-separation
- Rare-event logistic regression
- Small samples
- Models with many dummy variables relative to the sample size

---

## Firth's Model in R

The `logistf` package in R has a function `logistf` that takes as input either: 
- a glm object, or
- formula and data 

The `marginaleffects` functions work with `logistf` models. 
- If you see large parameters and really large standard errors in the model output, consider switching to `logistf`.
