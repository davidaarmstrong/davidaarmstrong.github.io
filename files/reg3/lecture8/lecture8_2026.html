## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation in non-linear GLMs is appropriately specified.    

Why might this assumption fail?

- The nature of the conditional relationship is not appropriately captured by the model's form. 
- The model imposes conditionality that is not really there.

## Today’s Robustness Question

What assumption/abstraction are we perturbing?
- That the nature of the relaionship between `\(x\)` and `\(y\)` regarding moderation in non-linear GLMs is appropriately specified.    

What are the limits of these tools?
- In essence, all variables are moderators - which to investigate?
- Evidence for moderation is often low power.
    - Interaction effects are typically estimated much less precisely than average effects.
    - Reliable estimation requires sufficient support across combinations of x and the moderator.


---

# Problems With Linear Interactions

Consider the following model:

`$$y = a + b_{1}X + b_{2}D + b_{3}X\times D + e$$`

Hainmueller, Mummolo and Xu argue that our linear interaction models like above suffer from two potential problems:

- The conditional partial effect of each variable is a linear function of the other: `\(b_{D|X} = b_{2} + b_{3}X\)`.  Thus for every additional unit of `\(X\)` the effect of `\(D\)` changes by the same amount.

- Support - most political scientists do not pay attention to the joint density of the interacting variables and what the implies about our ability to make inferences.


---

## Linearity

Consider the same model as before

`$$y = b_0 + b_{1}X + b_{2}D + b_{3}X\times D + e$$`

Consider two different values of `\(D: \{d_{1}, d_{2}\}\)`, the effect of this contrast is:

`$$\begin{aligned}
    \hat{Y}(D=d_{1}|X) - \hat{Y}(D=d_{2}|X) =&amp;  (a + b_{1}X + b_{2}d_{1} + b_{3}Xd_{1})\\
    &amp; - (a + b_{1}X + b_{2}d_{2} + b_{3}Xd_{2})\\
    =&amp; b_{2}(d_{1}-d_{2}) + b_{3}X(d_{1}-d_{2})
\end{aligned}$$`

The effect will only be appropriately estimated if *both* functions of `\(X\)` (for `\(d_{1}\)` and `\(d_{2}\)` are linear).



---

## Support

`$$b_{2}(d_{1}-d_{2}) + b_{3}X(d_{1}-d_{2})$$`

The equation above makes it clear that to reliably estimate the treatment:

- We must have reasonable data density at both `\(d_{1}\)` and `\(d_{2}\)` for each value of `\(X\)`.

- Failure of this condition results in interaction effects that are a function of interpolation and extrapolation.

# Binning Estimator for Interaction Effects

- Discretize `\(X\)` using its three terciles.

`$$G_{1}=\left\{\begin{array}{ll}
        1, &amp;\text{ if }X &lt; \delta_{\frac{1}{3}}\\
        0, &amp;\text{ Otherwise }
    \end{array}\right. \text{ }
    G_{2}=\left\{\begin{array}{ll}
        1, &amp;\text{ if }\delta_{\frac{1}{3}} \geq X &lt; \delta_{\frac{2}{3}}\\
        0, &amp;\text{ Otherwise }
    \end{array}\right.\text{ }
    G_{3}=\left\{\begin{array}{ll}
        1, &amp;\text{ if }\delta_{\frac{2}{3}} \geq X\\
        0, &amp;\text{ Otherwise }
    \end{array}\right.$$`


- Pick an evaluation point, `\(x_{j}\)`, in each of the `\(J\)` bins (usually the median of the `\(x\)` values within the bin)

- Estimate the model:

`$$Y = \sum_{j=1}^{J} \left\{u_{j} + \alpha_{j}D +\eta_{j}(X-x_{j}) + \beta_{j}(X-x_{j})D\right\}G_{j} + \ldots + \varepsilon$$`


---

# Advantages over Linear Interaction Effect


- More flexible for non-linear functional forms.  It fits separate interactions to each bin.

- Since `\((X-x_{j}) = 0\)` at the evaluation point, the partial conditional effect within each bin is just `\(\alpha_{j}\)`.

- Binning ensures that there is sufficient joint support on `\(X\)` and `\(D\)` since they are constructed from `\(X\)`.

- This model nests the linear interaction model, so it can serve as a test of the linear interaction effect model.

# Kernel Estimator

A kernel estimator is more flexible allowing the conditional partial effect to change across the values of `\(X\)`.

`$$Y = f(X) + g(X)D + \gamma(X)Z + \varepsilon$$`


- This is the standard linear interaction effect model when `\(f(x) = \mu + \nu X\)` and `\(g(x) = \alpha + \beta X\)` and `\(\gamma(X) = \gamma\)`.

# GAMs for the Fake Data I



``` r
library(mgcv)
dat$D1 &lt;- as.factor(dat$D1)
mod0u &lt;- gam(Y1 ~ X1 + D1, data=dat)
mod0 &lt;- gam(Y1 ~ X1*D1, data=dat)
mod1 &lt;- gam(Y1 ~ s(X1, by=D1) + D1,  
               data=dat)
anova(mod0, mod1, test="F")

## Simulation


``` r
sim_function &lt;- function(base, alt, vbl, byvar, m_num = 10, s_len = 10, 
                         type = c("slopes", "comparisons", "predictions", 
                                  "avg_slopes", "avg_comparisons", "avg_predictions"), 
                         R = 25, progress=TRUE, 
                         ...){
  type_fun &lt;- match.arg(type)
  nlevs &lt;- function(x){
    if(inherits(x, "factor"))length(levels(x))
    else length(unique(na.omit(x)))
  }
  tmp &lt;- insight::get_data(base)
  sim_resp &lt;- try(simulate(base)[[1]])
  if(inherits(sim_resp, "try-error")){
    stop("simulate() failed on base model.\n")
  }else{
  setvars &lt;- union(vbl, byvar)
  vars &lt;- lapply(setvars, \(x){
    nl &lt;- nlevs(tmp[[x]])
    if(nl &gt; m_num){
      seq_range(tmp[[x]], n=s_len)
    }else{
      if(inherits(tmp[[x]], "factor"))levels(tmp[[x]])
      else sort(unique(na.omit(tmp[[x]])))
    }
  })
  names(vars) &lt;- setvars  
  vars$model &lt;- base
  vars$grid_type = "mean_or_mode"
  dg &lt;- do.call(marginaleffects::datagrid, vars)
  efun &lt;- rlang::eval_bare(rlang::parse_expr(type_fun))
  e_base_orig &lt;- efun(base, newdata=dg, variables=vbl, by=byvar)
  e_alt_orig &lt;- efun(alt, newdata=dg, variables=vbl, by=byvar)
  out &lt;- purrr::map(1:R, \(z){
    tmp$sim_resp &lt;- simulate(base)[[1]]
    up_base &lt;- update(base, sim_resp~ ., data=tmp)
    up_alt &lt;- update(alt, sim_resp ~ ., data=tmp)
    rob &lt;- purrr::map(1:nrow(e_base), \(i){
    e_base &lt;- efun(up_base, newdata=dg, variables=vbl, by=byvar)
    e_alt &lt;- efun(up_alt, newdata=dg, variables=vbl, by=byvar)
    nprobustness::robustness(
      dnorm, dnorm, 
      target_args = list(mean = e_base$estimate[i], sd = e_base$std.error[i]), 
      alt_args = list(mean = e_alt$estimate[i], sd = e_alt$std.error[i]))
    }) |&gt; 
      bind_rows() |&gt; 
      bind_cols(dg |&gt; select(setvars))
  }, .progress=progress) |&gt; 
    bind_rows(.id="iter")
  rob_orig &lt;- purrr::map_df(1:nrow(e_base_orig), \(i){
  nprobustness::robustness(
    dnorm, dnorm, 
    target_args = list(mean = e_base_orig$estimate[i], sd = e_base_orig$std.error[i]), 
    alt_args = list(mean = e_alt_orig$estimate[i], sd = e_alt_orig$std.error[i]))
  }) 
out &lt;- out |&gt; 
  reframe(ovl = list(ovl), np = list(np), js = list(js), kl = list(kl), .by=all_of(setvars))
out &lt;- bind_cols(out, rob_orig |&gt; setNames(paste0(names(rob_orig), "_obs")))
out &lt;- out |&gt; 
  rowwise() |&gt; 
  mutate(ovl_pct = mean(ovl_obs &gt; ovl, na.rm=TRUE), 
         np_pct = mean(np_obs &gt; np, na.rm=TRUE), 
         js_pct = mean(js_obs &gt; js, na.rm=TRUE), 
         kl_pct = mean(kl_obs &gt; kl, na.rm=TRUE)) |&gt; 
  ungroup()
return(out)
}
}

sim_lg &lt;- sim_function(mod0, mod1, vbl="X1", byvar=c("X1", "D1"))
```

# GAMs for the Prestige Data



``` r
library(mgcv)

    women + type, data=Prestige)

              ti(income, education) + women + type, 
            data=Prestige)
anova(mod_int0, mod_int1)

# Interactions Conclusion

The GAM framework provides us the ability to: 
- model general non-linear interactions in both continuous and discrete variables
- do most everything suggested by Hainmueller et al.

  let res = {};
  d.querySelectorAll('.remark-help-content table tr').forEach(tr => {
    const t = tr.querySelector('td:nth-child(2)').innerText;
    tr.querySelectorAll('td:first-child .key').forEach(key => {
      const k = key.innerText;
      if (/^[a-z]$/.test(k)) res[k] = t;  // must be a single letter (key)
    });
  });
  d.body.setAttribute('data-at-shortcutkeys', JSON.stringify(res));
})(document);
(function() {
  "use strict"
  // Replace <script> tags in slides area to make them executable
  var scripts = document.querySelectorAll(
    '.remark-slides-area .remark-slide-container script'
  );
  if (!scripts.length) return;
  for (var i = 0; i < scripts.length; i++) {
    var s = document.createElement('script');
    var code = document.createTextNode(scripts[i].textContent);
    s.appendChild(code);
    var scriptAttrs = scripts[i].attributes;
    for (var j = 0; j < scriptAttrs.length; j++) {
      s.setAttribute(scriptAttrs[j].name, scriptAttrs[j].value);
    }
    scripts[i].parentElement.replaceChild(s, scripts[i]);
  }
})();
(function() {
  var links = document.getElementsByTagName('a');
  for (var i = 0; i < links.length; i++) {
    if (/^(https?:)?\/\//.test(links[i].getAttribute('href'))) {
      links[i].target = '_blank';
    }
  }
})();
// adds .remark-code-has-line-highlighted class to <pre> parent elements
// of code chunks containing highlighted lines with class .remark-code-line-highlighted
(function(d) {
  const hlines = d.querySelectorAll('.remark-code-line-highlighted');
  const preParents = [];
  const findPreParent = function(line, p = 0) {
    if (p > 1) return null; // traverse up no further than grandparent
    const el = line.parentElement;
    return el.tagName === "PRE" ? el : findPreParent(el, ++p);
  };

  for (let line of hlines) {
    let pre = findPreParent(line);
    if (pre && !preParents.includes(pre)) preParents.push(pre);
  }
  preParents.forEach(p => p.classList.add("remark-code-has-line-highlighted"));
})(document);</script>
